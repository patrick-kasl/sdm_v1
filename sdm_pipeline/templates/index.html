<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCQ Pipeline v1.7 - Core/Relevant, Jargon, & Auto-Detect (Fixed)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --danger: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --bg: #f5f6fa;
            --text: #2f3640;
            --border: #dcdde1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        h1, h2, h3 { color: #2c3e50; }
        
        /* NAVIGATION */
        .nav-bar {
            display: flex; gap: 10px; margin-bottom: 25px;
            border-bottom: 2px solid var(--border); padding-bottom: 15px;
        }
        .nav-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;
        }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn:hover:not(.active) { background: #eef2fa; }

        /* VIEWS */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* HISTORY TABLE */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .history-table th, .history-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .history-table th { background: #f1f2f6; }
        .history-table tr:hover { background-color: #f8f9fa; cursor: pointer; }
        .view-link { color: var(--secondary); font-weight: bold; cursor: pointer; }

        /* SETUP BOX */
        .setup-box { background: #f1f2f6; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #dfe4ea; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit;}
        button.run-btn { background-color: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;}
        button.run-btn:hover { background-color: #1f6391; }

        /* UNIFIED DASHBOARD & TREE */
        .tree-container { margin-bottom: 40px; }
        .decision-card {
            border: 1px solid #e1e4e8; border-radius: 8px; padding: 20px;
            background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border-left: 6px solid #ccc; margin-bottom: 15px;
        }
        .card-header { 
            margin-bottom: 15px; cursor: pointer; padding: 8px; border-radius: 6px; 
            transition: background 0.2s; margin-top: -8px; margin-left: -8px; margin-right: -8px;
        }
        .card-header:hover { background-color: rgba(0,0,0,0.03); }
        .card-header h4 { margin: 0 0 8px 0; font-size: 1.25rem; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #eee; margin-right: 5px; }
        .risk-badge { background: var(--secondary); color: white; }
        
        /* NEW BADGES */
        .core-badge { background: #e74c3c; color: white; }
        .relevant-badge { background: #7f8fa6; color: white; }
        
        /* CARD DETAILS */
        .map-options { background: #f8f9fa; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; }
        
        /* RISK TABLE */
        .risk-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .risk-table th, .risk-table td { padding: 10px; text-align: left; border-bottom: 1px solid #dfe4ea; vertical-align: top; }
        .risk-table th { background: #e8ecf1; }
        
        .status-Covered { color: var(--success); font-weight: bold; }
        .status-Partially { color: var(--warning); font-weight: bold; }
        .status-Not { color: #95a5a6; font-style: italic; }
        .encounter-badge { display: inline-block; padding: 3px 6px; background: #dfe6e9; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: var(--primary); margin-bottom: 2px; word-break: break-all;}

        .turn-link {
            display: inline-block; padding: 3px 8px; background: #e8ecf1; 
            border: 1px solid #d1d8e0; border-radius: 4px; font-size: 0.8rem;
            cursor: pointer; transition: all 0.2s; color: var(--primary);
            margin: 2px; font-family: monospace; font-weight: bold;
        }
        .turn-link:hover { background: var(--secondary); color: white; transform: scale(1.05); }

        /* GLOBAL TRANSCRIPT */
        .global-transcript { background: #fff; border: 1px solid #dcdde1; border-radius: 8px; padding: 20px; }
        .turn-container { display: flex; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid transparent; scroll-margin-top: 20px; }
        .turn-meta { width: 150px; flex-shrink: 0; padding: 10px; font-size: 0.8rem; font-weight: bold; color: #7f8fa6; text-align: right; border-right: 2px solid rgba(0,0,0,0.05); }
        .encounter-label { font-size: 0.65rem; color: var(--secondary); margin-bottom: 4px; text-transform: uppercase; word-break: break-all;}
        .turn-content { flex-grow: 1; padding: 10px 15px; font-family: monospace; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
        
        .turn-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
        .text-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-family: sans-serif; font-weight: bold; color: #fff; }

        /* Utility */
        .loading { display: none; padding: 20px; background: #f1f2f6; margin-bottom:20px; border-radius:4px; font-family: monospace;}
        .error { color: #e84118; margin-top: 10px; }

        @keyframes flash-highlight { 0% { outline: 3px solid #f39c12; background-color: rgba(243, 156, 18, 0.1); } 100% { outline: 3px solid transparent; background-color: transparent; } }
        .flash-turn { animation: flash-highlight 2s ease-out; }
    </style>
</head>
<body>

    <h1>AHRQ Multi-Encounter Pipeline v1.7</h1>
    <p style="margin-top:-15px; color:#7f8fa6; font-size:0.9rem;">Features: Core/Relevant Mapping, Jargon Scoring, Novel Risk Detection, Procedure Auto-Detect, Backend Persistence</p>

    <div class="nav-bar">
        <button class="nav-btn active" id="btn-new" onclick="switchTab('new')">Run Analysis</button>
        <button class="nav-btn" id="btn-history" onclick="switchTab('history')">Database History</button>
        <button class="nav-btn" id="btn-results" onclick="switchTab('results')" style="display:none;">View Results</button>
    </div>

    <!-- VIEW: NEW ANALYSIS -->

            <label><strong>2. Select Procedure:</strong></label>

        <div id="resultsContent"></div>

</div>

<script>
// --- INTERNAL TAXONOMY & COMPONENT DATABASE (Restored Full 13 Risks) ---

        { risk_item: "Intraoperative blood loss requiring transfusion", category: "Bleeding, hemorrhage, or blood-loss complication", importance: "Relevant", description: "Significant blood loss during surgery may necessitate blood transfusion..." },
        { risk_item: "Venous thromboembolism (DVT / PE)", category: "Cardiopulmonary or vascular complication", importance: "Relevant", description: "Blood clots may form in the legs (DVT) and travel to the lungs (PE)..." },

        { risk_item: "Pseudarthrosis (nonunion)", category: "Device, implant, hardware, biologic, graft complication", importance: "Core", description: "Failure of the bone graft to fuse solidly can cause persistent pain..." },
        { risk_item: "Hardware malposition, loosening, failure, or migration", category: "Device, implant, hardware, biologic, graft complication", importance: "Core", description: "Pedicle screws, rods, or cages may break, loosen, or migrate..." },
        // Restored items:
        { risk_item: "Adjacent segment disease", category: "Need for additional testing, treatment, or escalation of care", importance: "Relevant", description: "Accelerated degeneration of the disc levels above or below the fusion..." },
        { risk_item: "Reoperation / revision surgery", category: "Need for additional testing, treatment, or escalation of care", importance: "Core", description: "Additional surgery may be needed for recurrent stenosis, instability..." },
        { risk_item: "Functional limitation and prolonged recovery", category: "Functional limitation, disability, recovery burden", importance: "Relevant", description: "Recovery may involve weeks to months of activity restriction..." },
        { risk_item: "Bone graft donor site pain or complication", category: "Pain, discomfort, symptom worsening", importance: "Relevant", description: "If autologous iliac crest bone graft is harvested, the donor site may cause persistent pain..." },
        { risk_item: "Wound healing problems or scarring", category: "Scarring, cosmetic change, or body-image impact", importance: "Relevant", description: "Surgical incision may result in visible scarring, wound dehiscence..." }
    ],
    "COMP-PSY-01": [
        { risk_item: "Short-term memory loss / Cognitive changes", category: "Neurologic, cognitive, or sensory complication", importance: "Core", description: "Temporary loss of memories surrounding the time of the treatment." },
        { risk_item: "Muscle soreness", category: "Pain, discomfort, symptom worsening", importance: "Relevant", description: "Mild muscle aches following the procedure due to induced contractions." }
    ]
};

const PROCEDURES_DB = {
    "PROC-SPINE-01": {
        name: "Lumbar decompression with possible fusion",
        components: ["COMP-ANES-01", "COMP-SPIN-01"] 
    },
    "PROC-PSY-01": {
        name: "Electroconvulsive Therapy (ECT)",
        components: ["COMP-ANES-01", "COMP-PSY-01"]  
    }
};

function buildOntologyForProcedure(procedureID) {
    const proc = PROCEDURES_DB[procedureID];
    if(!proc) return [];
    let combinedRisks = [];
    proc.components.forEach(compId => {
        if(COMPONENTS_DB[compId]) {
            combinedRisks.push(...COMPONENTS_DB[compId]);
        }
    });
    return combinedRisks;
}

// --- STATE MANAGEMENT ---
document.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if(savedKey) document.getElementById('apiKey').value = savedKey;
});

function switchTab(tab) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

    document.getElementById(`view-${tab}`).classList.add('active');
    const btn = document.getElementById(`btn-${tab}`);
    if (btn) btn.classList.add('active');

    if (tab === 'history') loadHistory();
}

// --- DATABASE FETCHING (RESTORED) ---
async function loadHistory() {
    const container = document.getElementById('history-content');
    container.innerHTML = "Loading database...";
    try {
        const res = await fetch('/api/history');
        const data = await res.json();
        
        if (data.length === 0) {
            container.innerHTML = "<p>No runs found in the database. Run a new analysis!</p>";
            return;
        }

        let html = `<table class="history-table"><thead><tr><th>ID</th><th>Encounters Merged</th><th>Run Date</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(row => {
            html += `<tr onclick="loadRun(${row.id})"><td>#${row.id}</td><td><strong>${row.filename}</strong></td><td>${row.run_date}</td><td class="view-link">View Pipeline →</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (e) {
        container.innerHTML = `<span class="error">Failed to load history (Ensure backend is running): ${e.message}</span>`;
    }
}

async function loadRun(id) {
    document.getElementById('resultsContent').innerHTML = "<p>Loading layout...</p>";
    document.getElementById('btn-results').style.display = 'inline-block';
    switchTab('results');
    try {
        const res = await fetch(`/api/run/${id}`);
        const data = await res.json();
        renderUI(data.regions, data.turns);
    } catch (e) {
        document.getElementById('resultsContent').innerHTML = `<span class="error">Failed to load run data: ${e.message}</span>`;
    }
}

// --- PROMPTS & SCHEMAS ---

const AUTO_DETECT_SCHEMA = {
    "type": "object",
    "properties": { "detected_procedure_id": { "type": "string" } },
    "required": ["detected_procedure_id"]
};

const BROAD_SEGMENTATION_PROMPT = `
You are extracting the broad conversational boundaries of proposed procedures where consent is being obtained within this specific transcript.
Extract the broad boundaries (start and end turns) of the discussion.
`;

const BROAD_SEGMENTATION_SCHEMA = {
  "type": "object",
  "properties": {
    "decisions": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "problem_area": { "type": "string" },
          "summary": { "type": "string" },
          "decision_type": { "type": "string" },
          "broad_start_turn_index": { "type": "integer" },
          "broad_end_turn_index": { "type": "integer" }
        },
        "required": ["id", "problem_area", "summary", "decision_type", "broad_start_turn_index", "broad_end_turn_index"]
      }
    }
  }
};

const RELEVANCE_FILTERING_PROMPT = `
Identify the exact turn indices that are RELEVANT to the discussion of the procedure and its risks. Output an array of integers.
`;

const RELEVANCE_FILTERING_SCHEMA = {
  "type": "object",
  "properties": { "relevant_turn_indices": { "type": "array", "items": { "type": "integer" } } },
  "required": ["relevant_turn_indices"]
};

function getClassificationPrompt(ontologyText, procedureName, fileName) {
    return `
    You are evaluating a single transcript ("${fileName}") which is part of a patient's timeline for the procedure "${procedureName}".
    You must extract the standard AHRQ Consent Elements AND evaluate this specific transcript against the expected risk ontology.

    --- EXPECTED COMPONENT RISK ONTOLOGY ---
    ${ontologyText}
    ----------------------------------------

    CRITICAL INSTRUCTIONS:
    1. For EVERY risk in the ontology above, determine if the clinician mentioned it in THIS transcript.
       - Status MUST be exactly "Covered" (explicitly explained), "Partially Covered" (briefly mentioned), or "Not Mentioned".
       - Level of Detail: Explain how the provider described it.
       - Jargon Level: Rate the terminology used by the provider for this risk as "Low (Layman)", "Medium", or "High (Clinical/Heavy)". Use "N/A" if Not Mentioned.
       - Quote: Extract the EXACT quote. Put "N/A" if Not Mentioned.
       - Turn Indices: Provide an array of the exact integer turn numbers where this risk was discussed.
    2. Identify any ADDITIONAL risks discussed by the clinician that are NOT listed in the ontology above.
    `;
}

const CLASSIFICATION_SCHEMA = {
  "type": "object",
  "properties": {
    "ahrq_consent_checklist": {
      "type": "object",
      "properties": {
        "purpose_procedures_explained": { "type": "boolean" },
        "risks_discomforts_explained": { "type": "boolean" },
        "benefits_compensation_explained": { "type": "boolean" },
        "voluntariness_withdrawal_explained": { "type": "boolean" },
        "privacy_confidentiality_explained": { "type": "boolean" },
        "teach_back_used": { "type": "boolean" }
      },
      "required": ["purpose_procedures_explained", "risks_discomforts_explained", "benefits_compensation_explained", "voluntariness_withdrawal_explained", "privacy_confidentiality_explained", "teach_back_used"]
    },
    "ontology_risk_assessment": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "risk_item": { "type": "string" },
          "status": { "type": "string", "enum": ["Covered", "Partially Covered", "Not Mentioned"] },
          "level_of_detail": { "type": "string" },
          "jargon_level": { "type": "string", "enum": ["Low (Layman)", "Medium", "High (Clinical/Heavy)", "N/A"] },

          "turn_indices": { "type": "array", "items": { "type": "integer" } }
        },

      }
    },
    "additional_risks_discussed": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {

          "quote": { "type": "string" },
          "turn_indices": { "type": "array", "items": { "type": "integer" } }
        },
        "required": ["risk_name", "quote", "turn_indices"]
      }
    }
  }
};

const REGION_COLORS = [
    { bg: '#e8f4f8', border: '#3498db', tag: '#2980b9' }
];

function logStatus(msg) {
    const log = document.getElementById('statusLog');
    log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
}

function scrollToTurn(turnIndex) {
    const el = document.getElementById(`turn-${turnIndex}`);
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.remove('flash-turn');
        void el.offsetWidth; 
        el.classList.add('flash-turn');
    }
}

function parseMultipleTranscriptsToTurns(fileDataArray) {
    const globalTurns = [];
    let globalIndex = 0;
    
    fileDataArray.forEach((fileObj) => {
        const lines = fileObj.text.split('\n');
        let currentTurn = null;
        const speakerColonRegex = /^([A-Za-z\s\.\-\d]+):\s*(.*)$/;

        lines.forEach((line) => {
            const clean = line.trim();
            if (!clean) return;

            const colonMatch = clean.match(speakerColonRegex);
            if (colonMatch && colonMatch[1].length < 30) {
                if (currentTurn) globalTurns.push(currentTurn);
                currentTurn = { 
                    index: globalIndex++, 
                    encounter: fileObj.name, 
                    speaker_line: colonMatch[1].toUpperCase(), 
                    text_lines: [colonMatch[2] ? colonMatch[2] : []] 
                };
            } else {
                if (currentTurn) {
                    currentTurn.text_lines.push(clean);
                } else {
                    currentTurn = { 
                        index: globalIndex++, 
                        encounter: fileObj.name, 
                        speaker_line: "METADATA", 
                        text_lines: [clean] 
                    };
                }
            }
        });
        if (currentTurn) globalTurns.push(currentTurn);
    });
    return globalTurns;
}

async function callGemini(key, systemPrompt, schema, userContent) {
    // RESTORED: gemini-3.1-pro-preview endpoint
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${key}`;
    const payload = {
        system_instruction: { parts: [{ text: "You are a clinical research compliance expert focusing on AHRQ Informed Consent." }] },
        contents: [{ parts: [{ text: `${systemPrompt}\n\n${userContent}` }] }],
        generationConfig: { response_mime_type: "application/json", response_schema: schema, temperature: 0.1 }
    };

    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(await res.text());
    
    const data = await res.json();
    const rawString = data.candidates[0].content.parts[0].text;
    return JSON.parse(rawString);
}

// --- RUN PIPELINE ---
async function runAnalysis() {
    const fileInput = document.getElementById('fileInput');
    const apiKey = document.getElementById('apiKey').value;
    let procId = document.getElementById('procedureSelect').value;
    const loader = document.getElementById('loader');
    const errBox = document.getElementById('errorMsg');
    
    errBox.innerText = ""; document.getElementById('statusLog').innerHTML = "";
    if (!apiKey) { errBox.innerText = "API Key required"; return; }
    if (!fileInput.files.length) { errBox.innerText = "At least one transcript file required"; return; }

    localStorage.setItem('gemini_api_key', apiKey);
    loader.style.display = "block";
    
    try {
        const files = Array.from(fileInput.files);
        const fileDataArray = [];
        for (let f of files) {
            const text = await f.text();
            fileDataArray.push({ name: f.name, text: text });
        }
        
        logStatus(`Extracted ${files.length} encounter(s). Building global timeline...`);
        const globalTurns = parseMultipleTranscriptsToTurns(fileDataArray);
        
        // AUTO-DETECT LOGIC
        let autoDetectWarningMsg = null;
        if(procId === "AUTO") {
            logStatus("Step 0: Auto-detecting procedure from transcript early context...");
            // Analyzes the first 40 turns to detect procedure
            const sampleText = globalTurns.slice(0, 40).map(t => `[${t.speaker_line}] ${t.text_lines.join(' ')}`).join('\n');
            const procMapping = Object.keys(PROCEDURES_DB).map(k => `- ${k}: ${PROCEDURES_DB[k].name}`).join('\n');
            
            const autoPrompt = `Analyze the early turns of this transcript and determine which procedure is being discussed. Choose ONLY from the provided IDs.\n\nOptions:\n${procMapping}\n\nTranscript Snippet:\n${sampleText}`;
            
            const autoData = await callGemini(apiKey, autoPrompt, AUTO_DETECT_SCHEMA, "Determine the ID.");
            procId = autoData.detected_procedure_id;
            
            if(!PROCEDURES_DB[procId]) {
                 autoDetectWarningMsg = `⚠️ Auto-Detect failed. LLM returned unrecognized ID: "${procId}". The system has defaulted to evaluating against PROC-SPINE-01. Please verify if this ontology is correct.`;
                 logStatus(autoDetectWarningMsg);
                 procId = "PROC-SPINE-01";
            } else {
                 logStatus(`SUCCESS: Auto-detected procedure: ${PROCEDURES_DB[procId].name}`);
            }
        }

        const procDetails = PROCEDURES_DB[procId];
        const ontologyObj = buildOntologyForProcedure(procId);
        
        const ontologyText = ontologyObj.map((r) => 
            `- ${r.risk_item} (Cat: ${r.category})\n  Desc: ${r.description}`
        ).join("\n");

        const masterAssessment = {
            problem_area: "Combined Encounters",
            summary: procDetails.name,
            decision_type: "Patient Timeline Analysis",
            colorTheme: REGION_COLORS[0],
            customProcedureName: procDetails.name,
            autoDetectWarning: autoDetectWarningMsg, // Store warning if triggered
            ahrq_consent_checklist: {
                purpose_procedures_explained: false,
                risks_discomforts_explained: false,
                benefits_compensation_explained: false,
                voluntariness_withdrawal_explained: false,
                privacy_confidentiality_explained: false,
                teach_back_used: false
            },
            ontology_risk_assessment: ontologyObj.map(r => ({
                risk_item: r.risk_item,
                importance: r.importance,
                status: "Not Mentioned",
                level_of_detail: [],
                jargon_level: [],
                quote: [],
                turn_indices: [],
                files: []
            })),
            additional_risks_discussed: [],
            relevant_turn_indices: []
        };

        // Process EACH FILE INDEPENDENTLY
        for (let i = 0; i < files.length; i++) {
            const fName = files[i].name;
            logStatus(`--- Evaluating Transcript: ${fName} ---`);
            
            const localTurns = globalTurns.filter(t => t.encounter === fName);
            const localTranscriptText = localTurns.map(t => `[TURN ${t.index}] ${t.speaker_line}\n${t.text_lines.join('\n')}\n`).join('\n');

            logStatus(`Step 1/3: Identifying Consent Discussions in ${fName}...`);
            const broadData = await callGemini(apiKey, BROAD_SEGMENTATION_PROMPT, BROAD_SEGMENTATION_SCHEMA, localTranscriptText);
            const decisions = broadData.decisions || [];
            
            if (decisions.length === 0) {
                logStatus(`No consent discussions found in ${fName}. Skipping.`);
                continue;
            }

            for (let d = 0; d < decisions.length; d++) {
                const reg = decisions[d];
                let chunkText = "";
                for (let j = reg.broad_start_turn_index; j <= reg.broad_end_turn_index; j++) {
                    const turnObj = globalTurns.find(t => t.index === j);
                    if (turnObj) chunkText += `[TURN ${j}] ${turnObj.speaker_line}\n${turnObj.text_lines.join('\n')}\n\n`;
                }

                logStatus(`Step 2/3: Filtering irrelevant noise in ${fName}...`);
                const filterPromptStr = `Procedure: ${reg.summary}\n\nTranscript Chunk:\n${chunkText}`;
                const filterData = await callGemini(apiKey, RELEVANCE_FILTERING_PROMPT, RELEVANCE_FILTERING_SCHEMA, filterPromptStr);
                const validIndices = (filterData.relevant_turn_indices || []).sort((a,b) => a-b);
                masterAssessment.relevant_turn_indices.push(...validIndices);

                let filteredTranscriptText = "";
                validIndices.forEach(idx => {
                    const turnObj = globalTurns.find(t => t.index === idx);
                    if (turnObj) filteredTranscriptText += `[TURN ${idx}] ${turnObj.speaker_line}\n${turnObj.text_lines.join('\n')}\n\n`;
                });

                logStatus(`Step 3/3: Classifying risks for ${fName} (Core, Jargon, & Unlisted)...`);
                const dynamicPrompt = getClassificationPrompt(ontologyText, procDetails.name, fName);
                const classData = await callGemini(apiKey, dynamicPrompt, CLASSIFICATION_SCHEMA, filteredTranscriptText);

                // --- MERGE RESULTS ---
                for (let key in classData.ahrq_consent_checklist) {
                    if (classData.ahrq_consent_checklist[key]) masterAssessment.ahrq_consent_checklist[key] = true;
                }

                classData.ontology_risk_assessment.forEach(fileRisk => {
                    let masterRisk = masterAssessment.ontology_risk_assessment.find(r => r.risk_item === fileRisk.risk_item);
                    if (masterRisk && (fileRisk.status === "Covered" || fileRisk.status === "Partially Covered")) {
                        if (fileRisk.status === "Covered") masterRisk.status = "Covered";
                        else if (masterRisk.status === "Not Mentioned") masterRisk.status = "Partially Covered";
                        
                        if (!masterRisk.files.includes(fName)) masterRisk.files.push(fName);
                        
                        if (fileRisk.level_of_detail && fileRisk.level_of_detail !== "N/A" && fileRisk.level_of_detail !== "Not Mentioned") {
                            masterRisk.level_of_detail.push(`<strong>[${fName}]</strong> ${fileRisk.level_of_detail}`);
                        }
                        if (fileRisk.jargon_level && fileRisk.jargon_level !== "N/A") {
                            masterRisk.jargon_level.push(`<strong>[${fName}]</strong> ${fileRisk.jargon_level}`);
                        }
                        if (fileRisk.quote && fileRisk.quote !== "N/A" && fileRisk.quote !== "Not Mentioned") {
                            masterRisk.quote.push(`<strong>[${fName}]</strong> "${fileRisk.quote}"`);
                        }
                        if (fileRisk.turn_indices && fileRisk.turn_indices.length > 0) {
                            masterRisk.turn_indices.push(...fileRisk.turn_indices);
                        }
                    }
                });

                if (classData.additional_risks_discussed) {
                    classData.additional_risks_discussed.forEach(ar => {
                        masterAssessment.additional_risks_discussed.push({
                            risk_name: ar.risk_name,
                            quote: ar.quote,
                            file: fName,
                            turn_indices: ar.turn_indices || []
                        });
                    });
                }
            }
        }

        // RESTORED: Backend saving call
        logStatus("Analysis Complete. Attempting to save to local database...");
        try {
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filename: files.map(f=>f.name).join(' + '),
                    turns: globalTurns,
                    regions: [masterAssessment]
                })
            });
            logStatus("Saved to backend successfully.");
        } catch (e) {
            console.warn("Local DB not running, proceeding purely frontend.");
        }

        renderUI([masterAssessment], globalTurns);
        document.getElementById('btn-results').style.display = 'inline-block';
        switchTab('results');

    } catch (error) {
        console.error(error);
        errBox.innerText = "Error: " + error.message;
    } finally {
        loader.style.display = "none";
    }
}

// --- UI RENDERING ---
function renderTreeNode(node) {
    const cl = node.ahrq_consent_checklist || {};
    const risks = node.ontology_risk_assessment || [];
    const additionalRisks = node.additional_risks_discussed || [];
    
    // Core logic stats & Badges
    const coreRisks = risks.filter(r => r.importance === "Core");
    const coreCoveredCount = coreRisks.filter(r => r.status === "Covered").length;
    const totalCoveredCount = risks.filter(r => r.status === "Covered").length;
    
    const coreBadge = `<span class="badge risk-badge" style="background:#e74c3c; margin-bottom: 5px;">${coreCoveredCount}/${coreRisks.length} Core Risks Fully Covered</span>`;
    const totalBadge = `<span class="badge risk-badge" style="background:#34495e; margin-bottom: 5px;">${totalCoveredCount}/${risks.length} Total Expected Risks Fully Covered</span>`;
            
    const firstTurnIndex = (node.relevant_turn_indices && node.relevant_turn_indices.length > 0) ? node.relevant_turn_indices[0] : null;

    let warningHtml = '';
    if (node.autoDetectWarning) {
        warningHtml = `<div style="background-color: #fff3cd; color: #856404; padding: 12px; border: 1px solid #ffeeba; border-radius: 4px; margin-bottom: 15px; font-weight: bold; font-size: 0.95rem;">${node.autoDetectWarning}</div>`;
    }

    // Expected Risks Table
    let risksHtml = `
        <table class="risk-table">
            <thead><tr>
                <th style="width: 25%;">Expected Risk Item</th>
                <th>Status</th>
                <th>Jargon Level</th>
                <th>Encounter(s)</th>
                <th style="width: 25%;">How it was described</th>
                <th style="width: 20%;">Extracted Quote & Turns</th>
            </tr></thead>
            <tbody>
                ${risks.map(r => {
                    let statusClass = "status-Not";
                    if(r.status === "Covered") statusClass = "status-Covered";
                    if(r.status === "Partially Covered") statusClass = "status-Partially";
                    
                    let impBadge = r.importance === "Core" ? `<span class="badge core-badge">Core</span>` : `<span class="badge relevant-badge">Relevant</span>`;

                    let encounterBadges = (r.files && r.files.length > 0)
                        ? r.files.map(f => `<div class="encounter-badge">${f}</div>`).join('')
                        : '-';

                    let detailHtml = (r.level_of_detail && r.level_of_detail.length > 0)
                        ? r.level_of_detail.join('<br><br>') : '<span style="color:#95a5a6; font-style:italic;">N/A</span>';

                    let jargonHtml = (r.jargon_level && r.jargon_level.length > 0)
                        ? r.jargon_level.join('<br>') : '<span style="color:#95a5a6;">-</span>';

                    let quoteHtml = (r.quote && r.quote.length > 0)
                        ? r.quote.join('<br><br>') : '<span style="color:#95a5a6; font-style:italic;">N/A</span>';

                    let turnLinks = (r.turn_indices && r.turn_indices.length > 0)
                        ? r.turn_indices.map(t => `<span class="turn-link" onclick="scrollToTurn(${t})" title="Jump to Turn ${t}">T${t}</span>`).join(' ')
                        : '';

                    return `
                    <tr>
                        <td><strong>${r.risk_item}</strong><br>${impBadge}</td>
                        <td class="${statusClass}">${r.status}</td>
                        <td style="font-size:0.8rem;">${jargonHtml}</td>
                        <td>${encounterBadges}</td>
                        <td style="font-size: 0.85rem; color:#555;">${detailHtml}</td>
                        <td style="font-style:italic; font-size: 0.85rem; color:#7f8fa6;">${quoteHtml}<br><br>${turnLinks}</td>
                    </tr>
                    `
                }).join('')}
            </tbody>
        </table>
    `;

    // Novel/Unlisted Risks Table
    let additionalRisksHtml = '';
    if (additionalRisks.length > 0) {
        additionalRisksHtml = `
            <div class="map-options" style="background: #fff; border: 1px solid #dfe4ea; margin-top: 20px;">
                <strong style="font-size: 0.9rem; color: #d35400;">Unlisted / Additional Risks Mentioned (Not in Standard DB)</strong>
                <table class="risk-table" style="margin-top: 10px;">
                    <thead><tr>
                        <th style="width: 25%;">Mentioned Risk</th>
                        <th>Encounter File</th>
                        <th style="width: 50%;">Quote & Turns</th>
                    </tr></thead>
                    <tbody>
                        ${additionalRisks.map(ar => {
                            let turnLinks = (ar.turn_indices && ar.turn_indices.length > 0)
                                ? ar.turn_indices.map(t => `<span class="turn-link" onclick="scrollToTurn(${t})">T${t}</span>`).join(' ')
                                : '';
                            return `
                            <tr>
                                <td><strong>${ar.risk_name}</strong></td>
                                <td><div class="encounter-badge">${ar.file}</div></td>
                                <td style="font-style:italic; font-size: 0.85rem; color:#555;">"${ar.quote}"<br><br>${turnLinks}</td>
                            </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    const checklistHtml = `
        <ul style="margin: 5px 0 0 0; padding-left: 20px; font-size: 0.9rem; display: flex; flex-wrap: wrap; gap: 15px; list-style-type: none;">
            <li style="color: ${cl.purpose_procedures_explained ? 'green':'#e74c3c'}">${cl.purpose_procedures_explained ? '✅':'❌'} Purpose & Procedures</li>
            <li style="color: ${cl.risks_discomforts_explained ? 'green':'#e74c3c'}">${cl.risks_discomforts_explained ? '✅':'❌'} Risks Overview</li>
            <li style="color: ${cl.benefits_compensation_explained ? 'green':'#e74c3c'}">${cl.benefits_compensation_explained ? '✅':'❌'} Benefits</li>
            <li style="color: ${cl.voluntariness_withdrawal_explained ? 'green':'#e74c3c'}">${cl.voluntariness_withdrawal_explained ? '✅':'❌'} Voluntariness</li>
            <li style="color: ${cl.privacy_confidentiality_explained ? 'green':'#e74c3c'}">${cl.privacy_confidentiality_explained ? '✅':'❌'} Privacy/HIPAA</li>
            <li style="color: ${cl.teach_back_used ? 'green':'#e74c3c'}">${cl.teach_back_used ? '✅':'❌'} Teach-Back Used</li>
        </ul>
    `;
    
    let html = `
    <div class="decision-card" style="border-left-color: ${node.colorTheme.border}; opacity: 1;">
        ${warningHtml}
        <div class="card-header" ${firstTurnIndex !== null ? `onclick="scrollToTurn(${firstTurnIndex})"` : ''}>
            <h4>[${node.problem_area}] ${node.summary}</h4>
            <div>
                ${coreBadge} ${totalBadge}
                <span class="badge" style="background: ${node.colorTheme.bg}; color: ${node.colorTheme.tag}; border: 1px solid ${node.colorTheme.border}; margin-bottom: 5px;">${node.decision_type || 'Procedure'}</span>
            </div>
        </div>
        
        <div class="map-options">
            <strong style="font-size: 0.9rem;">Combined AHRQ Checklist (Found across encounters):</strong>
            ${checklistHtml}
        </div>

        <div class="map-options" style="background: #fff; border: 1px solid #dfe4ea;">
            <strong style="font-size: 0.9rem; color: var(--primary);">Aggregated Risk Assessment: ${node.customProcedureName}</strong>
            ${risksHtml}
        </div>
        
        ${additionalRisksHtml}
    </div>`;
    
    return html;
}

function renderUI(regions, turns) {
    const results = document.getElementById('resultsContent');
    let html = `<h2>AHRQ Procedure Dashboard (Patient Timeline View)</h2><div class="tree-container">`;
    regions.forEach(root => { html += renderTreeNode(root); });
    
    // Global Multi-File Transcript
    html += `</div><h2>Patient Timeline (Merged Transcripts)</h2><div class="global-transcript">`;

    turns.forEach((turn) => {
        const activeRegions = regions.filter(r => r.relevant_turn_indices && r.relevant_turn_indices.includes(turn.index));
        
        const turnTags = [];
        activeRegions.forEach(r => {
            if(r.ontology_risk_assessment) {
                r.ontology_risk_assessment.forEach(risk => {
                    if (risk.turn_indices && risk.turn_indices.includes(turn.index)) {
                        turnTags.push({ text: risk.risk_item, color: r.colorTheme.tag });
                    }
                });
            }
            if(r.additional_risks_discussed) {
                r.additional_risks_discussed.forEach(ar => {
                    if (ar.turn_indices && ar.turn_indices.includes(turn.index)) {
                        turnTags.push({ text: `[Novel] ${ar.risk_name}`, color: '#d35400' });
                    }
                });
            }
        });

        let turnBg = 'transparent';
        let turnBorder = 'transparent';
        
        if (activeRegions.length > 0) {
            turnBg = activeRegions[0].colorTheme.bg;
            turnBorder = activeRegions[0].colorTheme.border;
        }

        const tagsHtml = turnTags.map(t => `<span class="text-tag" style="background:${t.color};">${t.text}</span>`).join('');

        html += `
        <div id="turn-${turn.index}" class="turn-container" style="background: ${turnBg}; border-left-color: ${turnBorder};">
            <div class="turn-meta">
                <div class="encounter-label" title="${turn.encounter}">${turn.encounter.substring(0,12)}...</div>
                <div>[TURN ${turn.index}]</div>
                <div style="color:#2f3640;">${turn.speaker_line}</div>
            </div>
            <div class="turn-content">${tagsHtml.length > 0 ? `<div class="turn-tags">${tagsHtml}</div>` : ''}${turn.text_lines.join('\n')}</div>
        </div>`;
    });

    html += `</div>`;
    results.innerHTML = html;
}
</script>
