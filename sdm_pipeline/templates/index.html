<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCQ Pipeline v1.1 - AHRQ Informed Consent & Risk Analyzer</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --danger: #c0392b;
            --success: #27ae60;
            --bg: #f5f6fa;
            --text: #2f3640;
            --border: #dcdde1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        h1, h2, h3 { color: #2c3e50; }
        
        /* NAVIGATION */
        .nav-bar {
            display: flex; gap: 10px; margin-bottom: 25px;
            border-bottom: 2px solid var(--border); padding-bottom: 15px;
        }
        .nav-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;
        }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn:hover:not(.active) { background: #eef2fa; }

        /* VIEWS */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* HISTORY TABLE */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .history-table th, .history-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .history-table th { background: #f1f2f6; }
        .history-table tr:hover { background-color: #f8f9fa; cursor: pointer; }
        .view-link { color: var(--secondary); font-weight: bold; cursor: pointer; }

        /* SETUP BOX */
        .setup-box { background: #f1f2f6; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #dfe4ea; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button.run-btn { background-color: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;}
        button.run-btn:hover { background-color: #1f6391; }

        /* UNIFIED DASHBOARD & TREE */
        .tree-container { margin-bottom: 40px; }
        .decision-card {
            border: 1px solid #e1e4e8; border-radius: 8px; padding: 20px;
            background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border-left: 6px solid #ccc; margin-bottom: 15px;
        }
        .card-header { 
            margin-bottom: 15px; cursor: pointer; padding: 8px; border-radius: 6px; 
            transition: background 0.2s; margin-top: -8px; margin-left: -8px; margin-right: -8px;
        }
        .card-header:hover { background-color: rgba(0,0,0,0.03); }
        .card-header h4 { margin: 0 0 8px 0; font-size: 1.25rem; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #eee; margin-right: 5px; }
        .teachback-badge { background: #8e44ad; color: white; }
        .checklist-badge { background: #34495e; color: white; }
        .risk-badge { background: var(--danger); color: white; }
        
        .tree-children { margin-left: 20px; border-left: 2px dashed #bdc3c7; padding-left: 20px; margin-top: 20px; padding-top: 10px; }

        /* CARD DETAILS */
        .map-options { background: #f8f9fa; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; }
        
        /* RISK TABLE */
        .risk-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .risk-table th, .risk-table td { padding: 8px; text-align: left; border-bottom: 1px solid #dfe4ea; }
        .risk-table th { background: #e8ecf1; }
        .detail-Low { color: #f39c12; font-weight: bold; }
        .detail-Medium { color: #d35400; font-weight: bold; }
        .detail-High { color: #c0392b; font-weight: bold; }

        /* BEHAVIORS */
        .map-behaviors { display: flex; flex-wrap: wrap; gap: 10px; }
        .behavior-pill {
            background: #e8ecf1; border: 1px solid #d1d8e0; border-radius: 20px;
            padding: 5px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .behavior-pill:hover { transform: scale(1.03); box-shadow: 0 2px 5px rgba(0,0,0,0.1); background: #dcdde1; }
        .behavior-pill.invalid { text-decoration: line-through; opacity: 0.5; }
        .mapped-option-tag { font-size: 0.7rem; background: #fff; padding: 2px 6px; border-radius: 10px; border: 1px solid #dcdde1; color: #555; white-space: nowrap; text-overflow: ellipsis; max-width: 150px; overflow: hidden; }

        /* GLOBAL TRANSCRIPT */
        .global-transcript { background: #fff; border: 1px solid #dcdde1; border-radius: 8px; padding: 20px; }
        .turn-container { display: flex; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid transparent; scroll-margin-top: 20px; }
        .turn-meta { width: 150px; flex-shrink: 0; padding: 10px; font-size: 0.8rem; font-weight: bold; color: #7f8fa6; text-align: right; border-right: 2px solid rgba(0,0,0,0.05); }
        .turn-content { flex-grow: 1; padding: 10px 15px; font-family: monospace; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
        .turn-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
        .text-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-family: sans-serif; font-weight: bold; color: #fff; }

        /* Utility */
        .loading { display: none; padding: 20px; background: #f1f2f6; margin-bottom:20px; border-radius:4px; font-family: monospace;}
        .error { color: #e84118; margin-top: 10px; }

        @keyframes flash-highlight { 0% { outline: 3px solid #f39c12; background-color: rgba(243, 156, 18, 0.1); } 100% { outline: 3px solid transparent; background-color: transparent; } }
        .flash-turn { animation: flash-highlight 2s ease-out; }
    </style>
</head>
<body>

<div class="container">
    <h1>AHRQ Informed Consent & Risk Analyzer (v1.1)</h1>
    <p style="margin-top:-15px; color:#7f8fa6; font-size:0.9rem;">Compliant with AHRQ Informed Consent Toolkit (45 CFR 46.116, HIPAA, & Teach-Back Method)</p>

    <div class="nav-bar">
        <button class="nav-btn active" id="btn-new" onclick="switchTab('new')">+ New Analysis</button>
        <button class="nav-btn" id="btn-history" onclick="switchTab('history')">Database History</button>
    </div>

    <!-- VIEW: NEW ANALYSIS -->
    <div id="view-new" class="view-section active">
        <div class="setup-box">
            <label><strong>1. Google Gemini API Key:</strong></label>
            <input type="text" id="apiKey" placeholder="AIzaSy...">
            <label><strong>2. Transcript File (.txt):</strong></label>
            <input type="file" id="fileInput" accept=".txt">
            <button class="run-btn" onclick="runAnalysis()">Run AHRQ Consent Pipeline</button>
            <div class="error" id="errorMsg"></div>
        </div>
        <div class="loading" id="loader">
            <div id="statusLog"></div>
        </div>
    </div>

    <!-- VIEW: HISTORY -->
    <div id="view-history" class="view-section">
        <div id="history-content">Loading history...</div>
    </div>

    <!-- VIEW: RESULTS (Detail View) -->
    <div id="view-results" class="view-section">
        <button class="nav-btn" style="margin-bottom: 20px;" onclick="switchTab('history')">← Back to History</button>
        <div id="resultsContent"></div>
    </div>
</div>

<script>
// --- STATE MANAGEMENT ---
document.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if(savedKey) document.getElementById('apiKey').value = savedKey;
});

function switchTab(tab) {
    document.getElementById('view-new').classList.remove('active');
    document.getElementById('view-history').classList.remove('active');
    document.getElementById('view-results').classList.remove('active');
    document.getElementById('btn-new').classList.remove('active');
    document.getElementById('btn-history').classList.remove('active');

    if(tab === 'new') {
        document.getElementById('view-new').classList.add('active');
        document.getElementById('btn-new').classList.add('active');
    } else if(tab === 'history') {
        document.getElementById('view-history').classList.add('active');
        document.getElementById('btn-history').classList.add('active');
        loadHistory();
    } else if(tab === 'results') {
        document.getElementById('view-results').classList.add('active');
    }
}

// --- DATABASE FETCHING ---
async function loadHistory() {
    const container = document.getElementById('history-content');
    container.innerHTML = "Loading database...";
    try {
        const res = await fetch('/api/history');
        const data = await res.json();
        
        if (data.length === 0) {
            container.innerHTML = "<p>No runs found in the database. Run a new analysis!</p>";
            return;
        }

        let html = `<table class="history-table"><thead><tr><th>ID</th><th>Transcript Name</th><th>Run Date</th><th>Action</th></tr></thead><tbody>`;
        data.forEach(row => {
            html += `<tr onclick="loadRun(${row.id})"><td>#${row.id}</td><td><strong>${row.filename}</strong></td><td>${row.run_date}</td><td class="view-link">View Pipeline →</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (e) {
        container.innerHTML = `<span class="error">Failed to load history: ${e.message}</span>`;
    }
}

async function loadRun(id) {
    document.getElementById('resultsContent').innerHTML = "<p>Loading layout...</p>";
    switchTab('results');
    try {
        const res = await fetch(`/api/run/${id}`);
        const data = await res.json();
        const treeRoots = buildDecisionTree(data.regions);
        renderUI(data.regions, treeRoots, data.turns);
    } catch (e) {
        document.getElementById('resultsContent').innerHTML = `<span class="error">Failed to load run data: ${e.message}</span>`;
    }
}

// --- PROMPTS & SCHEMAS (AHRQ Compliant) ---

const BROAD_SEGMENTATION_PROMPT = `
You are an expert clinical conversation analyst focusing on AHRQ-compliant Informed Consent. Your ONLY goal is to EXTRACT the broad conversational boundaries of proposed research studies, clinical trials, medications, or procedures where consent is being obtained or discussed.

CRITICAL INSTRUCTIONS:
1. FUNDAMENTAL UNIT = PROPOSED STUDY OR TREATMENT: Identify the specific study, protocol, or intervention being proposed.
2. HIERARCHY: Identify dependent/contingent discussions (e.g., Blood draw consent inside a larger Clinical Trial consent).
3. BROAD BOUNDARIES: Capture from the VERY FIRST mention of the study/treatment to the VERY LAST related discussion or patient decision. Overlapping turn indices are expected.
`;

const BROAD_SEGMENTATION_SCHEMA = {
  "type": "object",
  "properties": {
    "decisions": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "parent_decision_id": { "type": "string", "description": "ID of parent, or 'none' if root" },
          "problem_area": { "type": "string", "description": "The specific study or procedure proposed" },
          "summary": { "type": "string" },
          "decision_type": { "type": "string", "enum": ["Research Study / Trial", "Clinical Procedure", "Medication"] },
          "boundary_rationale": { "type": "string" },
          "broad_start_turn_index": { "type": "integer" },
          "broad_end_turn_index": { "type": "integer" }
        },
        "required": ["id", "parent_decision_id", "problem_area", "summary", "decision_type", "boundary_rationale", "broad_start_turn_index", "broad_end_turn_index"]
      }
    }
  }
};

const RELEVANCE_FILTERING_PROMPT = `
You are an expert clinical data parser. You will be provided with a proposed "Study/Treatment" and a chunk of a transcript.
Your ONLY task is to identify the exact turn indices that are RELEVANT to the discussion of this specific study, its risks, benefits, privacy, voluntariness, and consent process.

CRITICAL INSTRUCTIONS:
1. STRIP THE HAYSTACK: Remove small talk or purely administrative check-in chat.
2. KEEP CONTEXT: Keep turns that provide necessary context for the consent discussion.
3. OUTPUT: Provide an array of strictly the integer turn numbers that form the cohesive discussion for this study.
`;

const RELEVANCE_FILTERING_SCHEMA = {
  "type": "object",
  "properties": {
    "decision_id": { "type": "string" },
    "relevant_turn_indices": { "type": "array", "items": { "type": "integer" } }
  },
  "required": ["decision_id", "relevant_turn_indices"]
};

const CLASSIFICATION_PROMPT_TEMPLATE = `
You are analyzing a filtered segment of a clinical transcript to extract the elements of AHRQ-compliant Informed Consent (based on 45 CFR 46.116 and HIPAA).

CRITICAL INSTRUCTIONS - AHRQ CONSENT ELEMENTS:
Assess whether the 5 core AHRQ/Regulatory elements of informed consent are present:
1. Purpose & Procedures: Is the goal of the study and what will happen explained?
2. Risks & Discomforts: Are foreseeable risks or discomforts explicitly stated?
3. Benefits & Compensation: Are benefits (or lack thereof) and compensation stated?
4. Voluntariness & Withdrawal: Is it stated that participation is voluntary and they can quit without penalty?
5. Privacy & Confidentiality (HIPAA): Is it explained who will see their data and how it is protected?

CRITICAL INSTRUCTIONS - TEACH-BACK METHOD (AHRQ pg 8-9):
AHRQ strictly requires assessing comprehension using the "Teach-Back" method, NOT just asking "Do you understand?".
- 'teach_back_used' is TRUE ONLY IF the researcher asks open-ended questions like "Tell me in your own words...", "What do you expect to gain...", "What risks would you be taking...". 
- Asking "Do you have any questions?" is NOT teach-back.

CRITICAL INSTRUCTIONS - RISK & DISCOMFORT EXTRACTION:
Extract EVERY individual risk or discomfort mentioned into the \`risks_discussed\` array.
For each:
- 'risk_name': Short name (e.g., "Sadness", "Loss of Privacy", "Bleeding").
- 'clinician_description': Exactly how the researcher described it.
- 'detail_level': "Low" (Named only), "Medium" (Explained slightly), "High" (Detailed explanation).
- 'is_probability_mentioned': True if a statistic or likelihood is provided.

BEHAVIOR MAPPING:
Map turns to the specific consent behaviors provided in the schema enum. Note: "Inviting Questions (Open-ended)" means asking "What questions do you have?" rather than "Do you have questions?".
`;

const CLASSIFICATION_SCHEMA = {
  "type": "object",
  "properties": {
    "ahrq_consent_checklist": {
      "type": "object",
      "properties": {
        "purpose_procedures_explained": { "type": "boolean" },
        "risks_discomforts_explained": { "type": "boolean" },
        "benefits_compensation_explained": { "type": "boolean" },
        "voluntariness_withdrawal_explained": { "type": "boolean" },
        "privacy_confidentiality_explained": { "type": "boolean" },
        "teach_back_used": { "type": "boolean", "description": "True ONLY if open-ended teach-back comprehension checks were used." }
      },
      "required": ["purpose_procedures_explained", "risks_discomforts_explained", "benefits_compensation_explained", "voluntariness_withdrawal_explained", "privacy_confidentiality_explained", "teach_back_used"]
    },
    "risks_discussed": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "risk_name": { "type": "string" },
          "clinician_description": { "type": "string" },
          "detail_level": { "type": "string", "enum": ["Low", "Medium", "High"] },
          "is_probability_mentioned": { "type": "boolean" },
          "turn_indices": { "type": "array", "items": { "type": "integer" } }
        },
        "required":["risk_name", "clinician_description", "detail_level", "is_probability_mentioned", "turn_indices"]
      }
    },
    "classified_turns": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "turn_index": { "type": "integer" },
          "behaviors": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "behavior_name": {
                  "type": "string",
                  "enum":[
                    "Discussing Purpose & Procedures", 
                    "Discussing Risks & Discomforts",
                    "Discussing Benefits & Compensation", 
                    "Discussing Voluntariness & Withdrawal",
                    "Discussing Privacy & Confidentiality", 
                    "Executing Teach-Back / Checking Comprehension",
                    "Inviting Questions (Open-ended)",
                    "Subject Consent/Refusal Stated"
                  ]
                },
                "related_risk_name": { "type": "string", "nullable": true },
                "confidence_score": { "type": "integer", "minimum": 0, "maximum": 100 }
              },
              "required":["behavior_name", "confidence_score"]
            }
          }
        },
        "required":["turn_index", "behaviors"]
      }
    }
  }
};

const REGION_COLORS = [
    { bg: '#e8f4f8', border: '#3498db', tag: '#2980b9' }, 
    { bg: '#f9f0e6', border: '#e67e22', tag: '#d35400' }, 
    { bg: '#eef8e8', border: '#2ecc71', tag: '#27ae60' }, 
    { bg: '#f4e8f8', border: '#9b59b6', tag: '#8e44ad' }, 
    { bg: '#fdf0f0', border: '#e74c3c', tag: '#c0392b' }, 
    { bg: '#fcf8e3', border: '#f1c40f', tag: '#f39c12' }  
];

function logStatus(msg) {
    const log = document.getElementById('statusLog');
    log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
}

function scrollToTurn(turnIndex) {
    const el = document.getElementById(`turn-${turnIndex}`);
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.remove('flash-turn');
        void el.offsetWidth;
        el.classList.add('flash-turn');
    }
}

function parseTranscriptToTurns(rawText) {
    const lines = rawText.split('\n');
    const turns = [];
    let currentTurn = null;

    // Matches "Speaker: Message" pattern robustly
    const speakerColonRegex = /^([A-Za-z\s\.\-\d]+):\s*(.*)$/;
    
    // Matches standalone speaker labels without colons (Fallback)
    const standaloneSpeakerRegex = /^(?:(?:FIRST|SECOND|THIRD)\s+)?(?:DOCTOR|PATIENT|CLINICIAN|PROVIDER|MOM|DAD|FAMILY|PHARMACIST|NURSE|SURGEON|PHYSICIAN|RESEARCHER|COORD)\b/i;

    lines.forEach((line) => {
        const clean = line.trim();
        if (!clean) return;

        const colonMatch = clean.match(speakerColonRegex);
        
        // 1. Check for "Speaker: Message" pattern (e.g. "Surgeon: Hi, Ms. Reynolds")
        if (colonMatch && colonMatch[1].length < 30 && !["NOTE", "TIME", "DATE", "SUBJECT"].includes(colonMatch[1].toUpperCase())) {
            if (currentTurn) turns.push(currentTurn);
            currentTurn = { 
                index: turns.length, 
                speaker_line: colonMatch[1].toUpperCase(), 
                text_lines: colonMatch[2] ? [colonMatch[2]] : [] 
            };
        } 
        // 2. Check for standalone speaker label (e.g. "PATIENT")
        else if (standaloneSpeakerRegex.test(clean) && clean.length < 50 && !clean.includes(':')) { 
            if (currentTurn) turns.push(currentTurn);
            currentTurn = { 
                index: turns.length, 
                speaker_line: clean.toUpperCase(), 
                text_lines: [] 
            };
        } 
        // 3. Otherwise, append text to current turn
        else {
            if (currentTurn) {
                currentTurn.text_lines.push(clean);
            } else {
                currentTurn = { index: 0, speaker_line: "METADATA", text_lines: [clean] };
            }
        }
    });
    
    if (currentTurn) turns.push(currentTurn);
    return turns;
}

function buildDecisionTree(regions) {
    const map = {};
    const roots = [];
    
    regions.forEach((r, i) => { 
        r.children = []; 
        r.colorTheme = REGION_COLORS[i % REGION_COLORS.length]; 
        map[r.id] = r; 
    });
    
    regions.forEach(r => {
        if (r.parent_decision_id && r.parent_decision_id !== 'none' && map[r.parent_decision_id]) {
            map[r.parent_decision_id].children.push(r);
        } else {
            roots.push(r);
        }
    });

    return roots;
}

async function callGemini(key, systemPrompt, schema, userContent) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${key}`;
    const payload = {
        system_instruction: { parts: [{ text: "You are a clinical research compliance expert focusing on AHRQ Informed Consent." }] },
        contents: [{ parts: [{ text: `${systemPrompt}\n\n${userContent}` }] }],
        generationConfig: { response_mime_type: "application/json", response_schema: schema, temperature: 0 }
    };

    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(await res.text());
    
    const data = await res.json();
    const rawString = data.candidates[0].content.parts[0].text.replace(/^```json\s*/i, '').replace(/```\s*$/, '').trim();
    return JSON.parse(rawString);
}

// --- RUN PIPELINE & SAVE ---
async function runAnalysis() {
    const fileInput = document.getElementById('fileInput');
    const apiKey = document.getElementById('apiKey').value;
    const loader = document.getElementById('loader');
    const errBox = document.getElementById('errorMsg');
    
    errBox.innerText = ""; document.getElementById('statusLog').innerHTML = "";
    if (!apiKey) { errBox.innerText = "API Key required"; return; }
    if (!fileInput.files.length) { errBox.innerText = "File required"; return; }

    localStorage.setItem('gemini_api_key', apiKey);
    loader.style.display = "block";
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async (e) => {
        try {
            const rawText = e.target.result;
            const turns = parseTranscriptToTurns(rawText);
            const fullTranscriptText = turns.map(t => `[TURN ${t.index}] ${t.speaker_line}\n${t.text_lines.join('\n')}\n`).join('\n');

            logStatus("Step 1/3: Identifying Consent Discussions...");
            const broadData = await callGemini(apiKey, BROAD_SEGMENTATION_PROMPT, BROAD_SEGMENTATION_SCHEMA, fullTranscriptText);
            const decisions = broadData.decisions || [];
            
            if (decisions.length === 0) {
                logStatus("No consent discussions found. Pipeline Complete.");
                loader.style.display = "none";
                return;
            }

            const finalRegions = [];

            for (let i = 0; i < decisions.length; i++) {
                const reg = decisions[i];
                logStatus(`Processing Region ${i+1}/${decisions.length}: "${reg.summary}"`);

                let chunkText = "";
                for (let j = reg.broad_start_turn_index; j <= reg.broad_end_turn_index; j++) {
                    if (turns[j]) chunkText += `[TURN ${j}] ${turns[j].speaker_line}\n${turns[j].text_lines.join('\n')}\n\n`;
                }

                logStatus(`Step 2/3 (Region ${i+1}): Extracting relevant context lines...`);
                const filterPromptStr = `Study/Protocol: ${reg.summary}\n\nTranscript Chunk:\n${chunkText}`;
                const filterData = await callGemini(apiKey, RELEVANCE_FILTERING_PROMPT, RELEVANCE_FILTERING_SCHEMA, filterPromptStr);
                
                const validIndices = (filterData.relevant_turn_indices || []).sort((a,b) => a-b);
                reg.relevant_turn_indices = validIndices;

                let filteredTranscriptText = "";
                validIndices.forEach(idx => {
                    if (turns[idx]) filteredTranscriptText += `[TURN ${idx}] ${turns[idx].speaker_line}\n${turns[idx].text_lines.join('\n')}\n\n`;
                });

                logStatus(`Step 3/3 (Region ${i+1}): Evaluating AHRQ Consent Elements & Extracting Risks...`);
                const classData = await callGemini(apiKey, CLASSIFICATION_PROMPT_TEMPLATE, CLASSIFICATION_SCHEMA, filteredTranscriptText);

                // Default isInvalid array for rendering safely
                if(classData.classified_turns) {
                    classData.classified_turns.forEach(ct => ct.behaviors.forEach(b => b.isInvalid = false));
                }

                const finalReg = { ...reg, ...classData };
                finalRegions.push(finalReg);
            }

            logStatus("Analysis Complete. Saving results to Local Database...");
            
            await fetch('/api/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filename: file.name,
                    raw_text: rawText,
                    turns: turns,
                    regions: finalRegions
                })
            });

            logStatus("Saved successfully. Building UI...");
            
            const treeRoots = buildDecisionTree(finalRegions);
            renderUI(finalRegions, treeRoots, turns);
            switchTab('results');

        } catch (error) {
            console.error(error);
            errBox.innerText = "Error: " + error.message;
        } finally {
            loader.style.display = "none";
        }
    };
    reader.readAsText(file);
}

// --- UI RENDERING ---

function renderTreeNode(node) {
    const cl = node.ahrq_consent_checklist || {};
    let score = 0;
    if(cl.purpose_procedures_explained) score++;
    if(cl.risks_discomforts_explained) score++;
    if(cl.benefits_compensation_explained) score++;
    if(cl.voluntariness_withdrawal_explained) score++;
    if(cl.privacy_confidentiality_explained) score++;
    
    const elementsBadge = `<span class="badge checklist-badge">${score}/5 AHRQ Req Elements</span>`;
    const tbBadge = cl.teach_back_used 
        ? `<span class="badge teachback-badge">✓ AHRQ Teach-Back Used</span>`
        : `<span class="badge" style="background:#95a5a6; color:white;">✗ No Teach-Back</span>`;

    const risksCount = (node.risks_discussed || []).length;
    const riskBadge = `<span class="badge risk-badge">${risksCount} Risk(s)/Discomfort(s) Mentioned</span>`;
            
    const firstTurnIndex = (node.relevant_turn_indices && node.relevant_turn_indices.length > 0) ? node.relevant_turn_indices[0] : null;

    // Build the detailed Risk Table
    let risksHtml = '';
    if (risksCount > 0) {
        risksHtml = `
            <table class="risk-table">
                <thead><tr><th>Risk/Discomfort</th><th>Clinician Description</th><th>Detail Level</th><th>Probability Mentioned?</th><th>Turns</th></tr></thead>
                <tbody>
                    ${node.risks_discussed.map(r => `
                        <tr>
                            <td><strong>${r.risk_name}</strong></td>
                            <td style="font-style:italic; color:#555;">"${r.clinician_description}"</td>
                            <td class="detail-${r.detail_level}">${r.detail_level}</td>
                            <td>${r.is_probability_mentioned ? 'Yes (Statistic/Likelihood)' : 'No'}</td>
                            <td>[${r.turn_indices.join(', ')}]</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } else {
        risksHtml = `<div style="padding: 10px; color: #7f8fa6; font-size: 0.9rem;">No specific risks or discomforts were explicitly extracted.</div>`;
    }

    // Build Checklist UI
    const checklistHtml = `
        <ul style="margin: 5px 0 0 0; padding-left: 20px; font-size: 0.9rem; display: flex; flex-wrap: wrap; gap: 15px; list-style-type: none;">
            <li style="color: ${cl.purpose_procedures_explained ? 'green':'#e74c3c'}">${cl.purpose_procedures_explained ? '✅':'❌'} Purpose & Procedures</li>
            <li style="color: ${cl.risks_discomforts_explained ? 'green':'#e74c3c'}">${cl.risks_discomforts_explained ? '✅':'❌'} Risks & Discomforts</li>
            <li style="color: ${cl.benefits_compensation_explained ? 'green':'#e74c3c'}">${cl.benefits_compensation_explained ? '✅':'❌'} Benefits & Comp</li>
            <li style="color: ${cl.voluntariness_withdrawal_explained ? 'green':'#e74c3c'}">${cl.voluntariness_withdrawal_explained ? '✅':'❌'} Voluntariness</li>
            <li style="color: ${cl.privacy_confidentiality_explained ? 'green':'#e74c3c'}">${cl.privacy_confidentiality_explained ? '✅':'❌'} Privacy/HIPAA</li>
        </ul>
    `;
    
    // Build Behaviors
    let behaviorsHtml = '';
    if (node.classified_turns) {
        node.classified_turns.forEach(ct => {
            ct.behaviors.forEach(b => {
                let optionLabelTag = '';
                if (b.related_risk_name) {
                    optionLabelTag = `<span class="mapped-option-tag" title="Mapped to Risk: ${b.related_risk_name}">→ ${b.related_risk_name}</span>`;
                }
                behaviorsHtml += `<div class="behavior-pill" title="Click to jump to Turn ${ct.turn_index}" onclick="scrollToTurn(${ct.turn_index})">
                    <span style="font-weight:bold; color: ${node.colorTheme.tag}">T${ct.turn_index}</span> 
                    ${b.behavior_name}
                    ${optionLabelTag}
                </div>`;
            });
        });
    }

    let html = `
    <div class="decision-card" style="border-left-color: ${node.colorTheme.border}; opacity: 1;">
        <div class="card-header" ${firstTurnIndex !== null ? `onclick="scrollToTurn(${firstTurnIndex})" title="Click to jump to start of discussion (Turn ${firstTurnIndex})"` : ''}>
            <h4>[${node.problem_area}] ${node.summary}</h4>
            <div>${elementsBadge}${tbBadge}${riskBadge}<span class="badge" style="background: ${node.colorTheme.bg}; color: ${node.colorTheme.tag}; border: 1px solid ${node.colorTheme.border}">${node.decision_type || 'Study'}</span></div>
        </div>
        <div style="font-size:0.85rem; color:#7f8fa6; margin-bottom:10px;">
            <strong>Filtered Turns:</strong> [${node.relevant_turn_indices.join(', ')}]
        </div>
        
        <div class="map-options">
            <strong style="font-size: 0.9rem;">AHRQ Req Disclosure Elements Present (45 CFR 46.116):</strong>
            ${checklistHtml}
        </div>

        <div class="map-options" style="background: #fff; border: 1px solid #dfe4ea;">
            <strong style="font-size: 0.9rem; color: #c0392b;">Extracted Risks & Discomforts:</strong>
            ${risksHtml}
        </div>

        <div style="margin-top:15px;"><strong style="font-size: 0.9rem;">Mapped Transcript Behaviors:</strong><div class="map-behaviors" style="margin-top:8px;">${behaviorsHtml || '<span style="color:#999; font-size:0.9rem;">No behaviors detected.</span>'}</div></div>`;
        
    if (node.children && node.children.length > 0) {
        html += `<div class="tree-children">`;
        node.children.forEach(child => { html += renderTreeNode(child); });
        html += `</div>`;
    }
    
    html += `</div>`;
    return html;
}

function renderUI(regions, treeRoots, turns) {
    const results = document.getElementById('resultsContent');
    let html = `<h2>AHRQ Informed Consent Dashboard</h2><div class="tree-container">`;
    treeRoots.forEach(root => { html += renderTreeNode(root); });
    html += `</div><h2>Global Transcript</h2><div class="global-transcript">`;

    turns.forEach((turn) => {
        const activeRegions = regions.filter(r => r.relevant_turn_indices.includes(turn.index));
        const turnTags = [];
        activeRegions.forEach(r => {
            if(r.classified_turns) {
                const mapped = r.classified_turns.find(ct => ct.turn_index === turn.index);
                if (mapped) {
                    mapped.behaviors.forEach(b => { 
                        const tagText = b.related_risk_name ? `${b.behavior_name} (${b.related_risk_name})` : b.behavior_name;
                        turnTags.push({ text: tagText, color: r.colorTheme.tag, invalid: b.isInvalid }); 
                    });
                }
            }
        });

        let turnBg = 'transparent';
        let turnBorder = 'transparent';
        
        if (activeRegions.length === 1) {
            turnBg = activeRegions[0].colorTheme.bg;
            turnBorder = activeRegions[0].colorTheme.border;
        } else if (activeRegions.length > 1) {
            const colors = activeRegions.map(r => r.colorTheme.bg);
            const gradientStops = colors.map((color, idx) => `${color} ${idx * 15}px, ${color} ${(idx + 1) * 15}px`).join(', ');
            turnBg = `repeating-linear-gradient(45deg, ${gradientStops})`;
            turnBorder = '#2f3640'; 
        }

        const tagsHtml = turnTags.map(t => `<span class="text-tag" style="background:${t.color}; ${t.invalid ? 'text-decoration:line-through; opacity:0.5;' : ''}">${t.text}</span>`).join('');

        html += `
        <div id="turn-${turn.index}" class="turn-container" style="background: ${turnBg}; border-left-color: ${turnBorder};">
            <div class="turn-meta"><div>[TURN ${turn.index}]</div><div style="color:#2f3640;">${turn.speaker_line}</div></div>
            <div class="turn-content">${tagsHtml.length > 0 ? `<div class="turn-tags">${tagsHtml}</div>` : ''}${turn.text_lines.join('\n')}</div>
        </div>`;
    });

    html += `</div>`;
    results.innerHTML = html;
}
</script>
