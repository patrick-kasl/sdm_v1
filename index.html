<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCQ Pipeline v1.5 - Ontology Risk Analyzer + Local DB</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #2980b9;
            --danger: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --bg: #f5f6fa;
            --text: #2f3640;
            --border: #dcdde1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        h1, h2, h3 { color: #2c3e50; }
        
        /* NAVIGATION */
        .nav-bar {
            display: flex; gap: 10px; margin-bottom: 25px;
            border-bottom: 2px solid var(--border); padding-bottom: 15px;
        }
        .nav-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;
        }
        .nav-btn.active { background: var(--primary); color: white; }
        .nav-btn:hover:not(.active) { background: #eef2fa; }

        /* VIEWS */
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* HISTORY TABLE */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .history-table th, .history-table td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .history-table th { background: #f1f2f6; }
        .history-table tr:hover { background-color: #f8f9fa; cursor: pointer; }
        .view-link { color: var(--secondary); font-weight: bold; cursor: pointer; }

        /* SETUP BOX */
        .setup-box { background: #f1f2f6; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #dfe4ea; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button.run-btn { background-color: var(--secondary); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold;}
        button.run-btn:hover { background-color: #1f6391; }
        button.clear-btn { background-color: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px; border-radius: 4px; cursor: pointer; float: right; margin-bottom: 10px; }
        button.clear-btn:hover { background-color: var(--danger); color: white; }

        /* UNIFIED DASHBOARD & TREE */
        .tree-container { margin-bottom: 40px; }
        .decision-card {
            border: 1px solid #e1e4e8; border-radius: 8px; padding: 20px;
            background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border-left: 6px solid #ccc; margin-bottom: 15px;
        }
        .card-header { 
            margin-bottom: 15px; cursor: pointer; padding: 8px; border-radius: 6px; 
            transition: background 0.2s; margin-top: -8px; margin-left: -8px; margin-right: -8px;
        }
        .card-header:hover { background-color: rgba(0,0,0,0.03); }
        .card-header h4 { margin: 0 0 8px 0; font-size: 1.25rem; }
        
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #eee; margin-right: 5px; }
        .teachback-badge { background: #8e44ad; color: white; }
        .checklist-badge { background: #34495e; color: white; }
        .risk-badge { background: var(--secondary); color: white; }
        
        /* CARD DETAILS */
        .map-options { background: #f8f9fa; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; }
        
        /* RISK TABLE */
        .risk-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .risk-table th, .risk-table td { padding: 10px; text-align: left; border-bottom: 1px solid #dfe4ea; vertical-align: top; }
        .risk-table th { background: #e8ecf1; }
        
        .status-Covered { color: var(--success); font-weight: bold; }
        .status-Partially { color: var(--warning); font-weight: bold; }
        .status-Not { color: #95a5a6; font-style: italic; }

        .turn-link {
            display: inline-block; padding: 3px 8px; background: #e8ecf1; 
            border: 1px solid #d1d8e0; border-radius: 4px; font-size: 0.8rem;
            cursor: pointer; transition: all 0.2s; color: var(--primary);
            margin: 2px; font-family: monospace; font-weight: bold;
        }
        .turn-link:hover { background: var(--secondary); color: white; transform: scale(1.05); }

        /* GLOBAL TRANSCRIPT */
        .global-transcript { background: #fff; border: 1px solid #dcdde1; border-radius: 8px; padding: 20px; }
        .turn-container { display: flex; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid transparent; scroll-margin-top: 20px; }
        .turn-meta { width: 150px; flex-shrink: 0; padding: 10px; font-size: 0.8rem; font-weight: bold; color: #7f8fa6; text-align: right; border-right: 2px solid rgba(0,0,0,0.05); }
        .turn-content { flex-grow: 1; padding: 10px 15px; font-family: monospace; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; }
        
        .turn-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
        .text-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-family: sans-serif; font-weight: bold; color: #fff; }

        /* Utility */
        .loading { display: none; padding: 20px; background: #f1f2f6; margin-bottom:20px; border-radius:4px; font-family: monospace;}
        .error { color: #e84118; margin-top: 10px; }

        @keyframes flash-highlight { 0% { outline: 3px solid #f39c12; background-color: rgba(243, 156, 18, 0.1); } 100% { outline: 3px solid transparent; background-color: transparent; } }
        .flash-turn { animation: flash-highlight 2s ease-out; }
    </style>
</head>
<body>

<div class="container">
    <h1>AHRQ Informed Consent Dashboard (Ontology-Driven)</h1>
    <p style="margin-top:-15px; color:#7f8fa6; font-size:0.9rem;">Evaluating transcripts against strict, procedure-specific clinical ontologies.</p>

    <div class="nav-bar">
        <button class="nav-btn active" id="btn-new" onclick="switchTab('new')">Run Analysis</button>
        <button class="nav-btn" id="btn-history" onclick="switchTab('history')">Database History</button>
        <button class="nav-btn" id="btn-results" onclick="switchTab('results')" style="display:none;">View Results</button>
    </div>

    <!-- VIEW: NEW ANALYSIS -->
    <div id="view-new" class="view-section active">
        <div class="setup-box">
            <label><strong>1. Google Gemini API Key:</strong></label>
            <input type="text" id="apiKey" placeholder="AIzaSy...">
            <label><strong>2. Transcript File (.txt):</strong></label>
            <input type="file" id="fileInput" accept=".txt">
            <p style="font-size: 0.85rem; color: #7f8fa6;">* For this demo, the ontology defaults to <b>Lumbar decompression with possible fusion</b>.</p>
            <button class="run-btn" onclick="runAnalysis()">Run Ontology Pipeline</button>
            <div class="error" id="errorMsg"></div>
        </div>
        <div class="loading" id="loader">
            <div id="statusLog"></div>
        </div>
    </div>

    <!-- VIEW: HISTORY -->
    <div id="view-history" class="view-section">
        <button class="clear-btn" onclick="clearHistory()">🗑️ Clear Database</button>
        <div id="history-content">Loading history...</div>
    </div>

    <!-- VIEW: RESULTS -->
    <div id="view-results" class="view-section">
        <button class="nav-btn" style="margin-bottom: 20px;" onclick="switchTab('history')">← Back to History</button>
        <div id="resultsContent"></div>
    </div>
</div>

<script>
// --- ONTOLOGY DATABASE ---
const LUMBAR_FUSION_ONTOLOGY = [
    { risk_item: "Dural tear / CSF leak", category: "Tissue, organ, structural, or anatomic injury", description: "Inadvertent tear of the dural membrane during decompression can cause cerebrospinal fluid leakage..." },
    { risk_item: "Nerve root injury or new neurologic deficit", category: "Neurologic, cognitive, or sensory complication", description: "Surgery may cause new or worsened radiculopathy, motor weakness..." },
    { risk_item: "Cauda equina syndrome", category: "Neurologic, cognitive, or sensory complication", description: "Rare compression or injury to the cauda equina can cause bowel/bladder dysfunction..." },
    { risk_item: "Surgical site infection (superficial or deep)", category: "Infection, contamination, or transmissible exposure", description: "Wound infection may require antibiotics and, if deep, surgical washout..." },
    { risk_item: "Epidural hematoma", category: "Bleeding, hemorrhage, or blood-loss complication", description: "Postoperative blood collection in the epidural space can compress neural structures..." },
    { risk_item: "Intraoperative blood loss requiring transfusion", category: "Bleeding, hemorrhage, or blood-loss complication", description: "Significant blood loss during surgery may necessitate blood transfusion..." },
    { risk_item: "Venous thromboembolism (DVT / PE)", category: "Cardiopulmonary or vascular complication", description: "Blood clots may form in the legs (DVT) and travel to the lungs (PE)..." },
    { risk_item: "Failed back surgery syndrome / persistent symptoms", category: "Failure to achieve intended result", description: "Pain, numbness, or functional limitation may persist or recur..." },
    { risk_item: "Pseudarthrosis (nonunion)", category: "Device, implant, hardware, biologic, graft complication", description: "Failure of the bone graft to fuse solidly can cause persistent pain..." },
    { risk_item: "Hardware malposition, loosening, failure, or migration", category: "Device, implant, hardware, biologic, graft complication", description: "Pedicle screws, rods, or cages may break, loosen, or migrate..." },
    { risk_item: "Adjacent segment disease", category: "Need for additional testing, treatment, or escalation of care", description: "Accelerated degeneration of the disc levels above or below the fusion..." },
    { risk_item: "Reoperation / revision surgery", category: "Need for additional testing, treatment, or escalation of care", description: "Additional surgery may be needed for recurrent stenosis, instability..." },
    { risk_item: "General anesthesia complications", category: "Medication, anesthesia, sedation complication", description: "General anesthesia carries risks including adverse drug reaction..." },
    { risk_item: "Major medical complication (MI, stroke, pneumonia, sepsis)", category: "Cardiopulmonary or vascular complication", description: "Serious cardiopulmonary events including myocardial infarction, stroke..." },
    { risk_item: "Functional limitation and prolonged recovery", category: "Functional limitation, disability, recovery burden", description: "Recovery may involve weeks to months of activity restriction..." },
    { risk_item: "Bone graft donor site pain or complication", category: "Pain, discomfort, symptom worsening", description: "If autologous iliac crest bone graft is harvested, the donor site may cause persistent pain..." },
    { risk_item: "Death", category: "Death, life-threatening outcome, or catastrophic harm", description: "Death is a rare but recognized outcome of lumbar spine surgery..." },
    { risk_item: "Wound healing problems or scarring", category: "Scarring, cosmetic change, or body-image impact", description: "Surgical incision may result in visible scarring, wound dehiscence..." }
];

// --- STATE MANAGEMENT ---
document.addEventListener('DOMContentLoaded', () => {
    const savedKey = localStorage.getItem('gemini_api_key');
    if(savedKey) document.getElementById('apiKey').value = savedKey;
});

function switchTab(tab) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

    document.getElementById(`view-${tab}`).classList.add('active');
    
    const btn = document.getElementById(`btn-${tab}`);
    if (btn) btn.classList.add('active');

    if (tab === 'history') {
        loadHistory();
    }
}

// --- BROWSER LOCAL STORAGE DATABASE ---
function saveToLocalDB(filename, turns, regions) {
    let history = JSON.parse(localStorage.getItem('ccq_history') || '[]');
    const newRun = {
        id: Date.now(), // Generate a unique ID based on timestamp
        filename: filename,
        run_date: new Date().toLocaleString(),
        turns: turns,
        regions: regions
    };
    
    history.unshift(newRun); // Add to the top of the list
    if(history.length > 10) history = history.slice(0, 10); // Keep only the last 10 runs to save space
    
    localStorage.setItem('ccq_history', JSON.stringify(history));
}

function getFromLocalDB() {
    return JSON.parse(localStorage.getItem('ccq_history') || '[]');
}

function clearHistory() {
    if(confirm("Are you sure you want to clear all run history?")) {
        localStorage.removeItem('ccq_history');
        loadHistory();
    }
}

function loadHistory() {
    const container = document.getElementById('history-content');
    const data = getFromLocalDB();
    
    if (data.length === 0) {
        container.innerHTML = "<p>No runs found in the database. Run a new analysis!</p>";
        return;
    }

    let html = `<table class="history-table"><thead><tr><th>ID</th><th>Transcript Name</th><th>Run Date</th><th>Action</th></tr></thead><tbody>`;
    data.forEach(row => {
        html += `<tr onclick="loadRun(${row.id})">
            <td>#${row.id.toString().slice(-6)}</td>
            <td><strong>${row.filename}</strong></td>
            <td>${row.run_date}</td>
            <td class="view-link">View Pipeline →</td>
        </tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
}

function loadRun(id) {
    const data = getFromLocalDB();
    const run = data.find(r => r.id === id);
    if(run) {
        document.getElementById('resultsContent').innerHTML = "<p>Loading layout...</p>";
        document.getElementById('btn-results').style.display = 'inline-block';
        switchTab('results');
        renderUI(run.regions, run.turns);
    } else {
        alert("Error: Run not found in database.");
    }
}

// --- PROMPTS & SCHEMAS ---
const BROAD_SEGMENTATION_PROMPT = `
You are extracting the broad conversational boundaries of proposed procedures where consent is being obtained.
Extract the broad boundaries (start and end turns) of the discussion.
`;

const BROAD_SEGMENTATION_SCHEMA = {
  "type": "object",
  "properties": {
    "decisions": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "parent_decision_id": { "type": "string" },
          "problem_area": { "type": "string" },
          "summary": { "type": "string" },
          "decision_type": { "type": "string" },
          "broad_start_turn_index": { "type": "integer" },
          "broad_end_turn_index": { "type": "integer" }
        },
        "required": ["id", "problem_area", "summary", "decision_type", "broad_start_turn_index", "broad_end_turn_index"]
      }
    }
  }
};

const RELEVANCE_FILTERING_PROMPT = `
Identify the exact turn indices that are RELEVANT to the discussion of the procedure and its risks. Output an array of integers.
`;

const RELEVANCE_FILTERING_SCHEMA = {
  "type": "object",
  "properties": { "relevant_turn_indices": { "type": "array", "items": { "type": "integer" } } },
  "required": ["relevant_turn_indices"]
};

function getClassificationPrompt(ontologyText) {
    return `
    You are evaluating a transcript for the procedure "Lumbar decompression with possible fusion".
    You must extract the standard AHRQ Consent Elements AND evaluate the transcript against the following strict risk ontology:

    --- EXPECTED RISK ONTOLOGY ---
    ${ontologyText}
    ------------------------------

    CRITICAL INSTRUCTIONS:
    For EVERY risk in the ontology above, determine if the clinician mentioned it to the patient.
    - Status MUST be exactly "Covered" (explicitly explained), "Partially Covered" (briefly mentioned/vaguely alluded to), or "Not Mentioned".
    - Level of Detail: Explain how the provider described it (or write "N/A" if Not Mentioned).
    - Quote: Extract the EXACT quote. Put "N/A" if Not Mentioned.
    - Turn Indices: Provide an array of the exact integer turn numbers where this risk was discussed. If Not Mentioned, provide an empty array [].
    `;
}

const CLASSIFICATION_SCHEMA = {
  "type": "object",
  "properties": {
    "ahrq_consent_checklist": {
      "type": "object",
      "properties": {
        "purpose_procedures_explained": { "type": "boolean" },
        "risks_discomforts_explained": { "type": "boolean" },
        "benefits_compensation_explained": { "type": "boolean" },
        "voluntariness_withdrawal_explained": { "type": "boolean" },
        "privacy_confidentiality_explained": { "type": "boolean" },
        "teach_back_used": { "type": "boolean" }
      },
      "required": ["purpose_procedures_explained", "risks_discomforts_explained", "benefits_compensation_explained", "voluntariness_withdrawal_explained", "privacy_confidentiality_explained", "teach_back_used"]
    },
    "ontology_risk_assessment": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "risk_item": { "type": "string" },
          "status": { "type": "string", "enum": ["Covered", "Partially Covered", "Not Mentioned"] },
          "level_of_detail": { "type": "string" },
          "quote": { "type": "string" },
          "turn_indices": { "type": "array", "items": { "type": "integer" }, "description": "Array of turn numbers where this risk is mentioned." }
        },
        "required":["risk_item", "status", "level_of_detail", "quote", "turn_indices"]
      }
    }
  }
};

const REGION_COLORS = [
    { bg: '#e8f4f8', border: '#3498db', tag: '#2980b9' }, 
    { bg: '#f9f0e6', border: '#e67e22', tag: '#d35400' }
];

function logStatus(msg) {
    const log = document.getElementById('statusLog');
    log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
}

function scrollToTurn(turnIndex) {
    const el = document.getElementById(`turn-${turnIndex}`);
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.remove('flash-turn');
        void el.offsetWidth; // Trigger reflow to restart animation
        el.classList.add('flash-turn');
    }
}

function parseTranscriptToTurns(rawText) {
    const lines = rawText.split('\n');
    const turns = [];
    let currentTurn = null;
    const speakerColonRegex = /^([A-Za-z\s\.\-\d]+):\s*(.*)$/;

    lines.forEach((line) => {
        const clean = line.trim();
        if (!clean) return;

        const colonMatch = clean.match(speakerColonRegex);
        if (colonMatch && colonMatch[1].length < 30) {
            if (currentTurn) turns.push(currentTurn);
            currentTurn = { index: turns.length, speaker_line: colonMatch[1].toUpperCase(), text_lines: colonMatch[2] ? [colonMatch[2]] : [] };
        } else {
            if (currentTurn) currentTurn.text_lines.push(clean);
            else currentTurn = { index: 0, speaker_line: "METADATA", text_lines: [clean] };
        }
    });
    if (currentTurn) turns.push(currentTurn);
    return turns;
}

async function callGemini(key, systemPrompt, schema, userContent) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${key}`;
    const payload = {
        system_instruction: { parts: [{ text: "You are a clinical research compliance expert focusing on AHRQ Informed Consent." }] },
        contents: [{ parts: [{ text: `${systemPrompt}\n\n${userContent}` }] }],
        generationConfig: { response_mime_type: "application/json", response_schema: schema, temperature: 0.1 }
    };

    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(await res.text());
    
    const data = await res.json();
    const rawString = data.candidates[0].content.parts[0].text;
    return JSON.parse(rawString);
}

// --- RUN PIPELINE ---
async function runAnalysis() {
    const fileInput = document.getElementById('fileInput');
    const apiKey = document.getElementById('apiKey').value;
    const loader = document.getElementById('loader');
    const errBox = document.getElementById('errorMsg');
    
    errBox.innerText = ""; document.getElementById('statusLog').innerHTML = "";
    if (!apiKey) { errBox.innerText = "API Key required"; return; }
    if (!fileInput.files.length) { errBox.innerText = "File required"; return; }

    localStorage.setItem('gemini_api_key', apiKey);
    loader.style.display = "block";
    
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async (e) => {
        try {
            const rawText = e.target.result;
            const turns = parseTranscriptToTurns(rawText);
            const fullTranscriptText = turns.map(t => `[TURN ${t.index}] ${t.speaker_line}\n${t.text_lines.join('\n')}\n`).join('\n');

            logStatus("Step 1/3: Identifying Consent Discussions...");
            const broadData = await callGemini(apiKey, BROAD_SEGMENTATION_PROMPT, BROAD_SEGMENTATION_SCHEMA, fullTranscriptText);
            const decisions = broadData.decisions || [];
            
            if (decisions.length === 0) {
                logStatus("No consent discussions found.");
                loader.style.display = "none";
                return;
            }

            const finalRegions = [];

            for (let i = 0; i < decisions.length; i++) {
                const reg = decisions[i];
                logStatus(`Processing Region ${i+1}/${decisions.length}: "${reg.summary}"`);

                let chunkText = "";
                for (let j = reg.broad_start_turn_index; j <= reg.broad_end_turn_index; j++) {
                    if (turns[j]) chunkText += `[TURN ${j}] ${turns[j].speaker_line}\n${turns[j].text_lines.join('\n')}\n\n`;
                }

                logStatus(`Step 2/3: Filtering irrelevant noise...`);
                const filterPromptStr = `Procedure: ${reg.summary}\n\nTranscript Chunk:\n${chunkText}`;
                const filterData = await callGemini(apiKey, RELEVANCE_FILTERING_PROMPT, RELEVANCE_FILTERING_SCHEMA, filterPromptStr);
                const validIndices = (filterData.relevant_turn_indices || []).sort((a,b) => a-b);
                reg.relevant_turn_indices = validIndices;

                let filteredTranscriptText = "";
                validIndices.forEach(idx => {
                    if (turns[idx]) filteredTranscriptText += `[TURN ${idx}] ${turns[idx].speaker_line}\n${turns[idx].text_lines.join('\n')}\n\n`;
                });

                logStatus(`Step 3/3: Evaluating transcript against specific Procedure Ontology...`);
                
                const ontologyText = LUMBAR_FUSION_ONTOLOGY.map((r, idx) => 
                    `${idx+1}. ${r.risk_item} (Cat: ${r.category})\n   Desc: ${r.description}`
                ).join("\n");
                
                const dynamicPrompt = getClassificationPrompt(ontologyText);
                const classData = await callGemini(apiKey, dynamicPrompt, CLASSIFICATION_SCHEMA, filteredTranscriptText);

                reg.colorTheme = REGION_COLORS[i % REGION_COLORS.length];
                finalRegions.push({ ...reg, ...classData });
            }

            logStatus("Analysis Complete. Saving results to Database...");
            
            // Replaced the broken fetch API call with Local Storage saving
            saveToLocalDB(file.name, turns, finalRegions);
            logStatus("Saved successfully.");

            logStatus("Building UI...");
            renderUI(finalRegions, turns);
            
            document.getElementById('btn-results').style.display = 'inline-block';
            switchTab('results');

        } catch (error) {
            console.error(error);
            errBox.innerText = "Error: " + error.message;
        } finally {
            loader.style.display = "none";
        }
    };
    reader.readAsText(file);
}

// --- UI RENDERING ---
function renderTreeNode(node) {
    const cl = node.ahrq_consent_checklist || {};
    const risks = node.ontology_risk_assessment || [];
    
    const coveredCount = risks.filter(r => r.status === "Covered").length;

    const riskBadge = `<span class="badge risk-badge">${coveredCount} Expected Risks Fully Covered</span>`;
            
    const firstTurnIndex = (node.relevant_turn_indices && node.relevant_turn_indices.length > 0) ? node.relevant_turn_indices[0] : null;

    // Build the Ontology Risk Table
    let risksHtml = `
        <table class="risk-table">
            <thead><tr><th>Expected Risk Item</th><th>Status</th><th>How it was described</th><th>Turns</th><th>Extracted Quote</th></tr></thead>
            <tbody>
                ${risks.map(r => {
                    let statusClass = "status-Not";
                    if(r.status === "Covered") statusClass = "status-Covered";
                    if(r.status === "Partially Covered") statusClass = "status-Partially";
                    
                    let turnLinks = (r.turn_indices && r.turn_indices.length > 0)
                        ? r.turn_indices.map(t => `<span class="turn-link" onclick="scrollToTurn(${t})" title="Jump to Turn ${t}">T${t}</span>`).join(' ')
                        : '-';

                    return `
                    <tr>
                        <td><strong>${r.risk_item}</strong></td>
                        <td class="${statusClass}">${r.status}</td>
                        <td style="font-size: 0.85rem; color:#555;">${r.level_of_detail}</td>
                        <td>${turnLinks}</td>
                        <td style="font-style:italic; font-size: 0.85rem; color:#7f8fa6;">"${r.quote}"</td>
                    </tr>
                    `
                }).join('')}
            </tbody>
        </table>
    `;

    // Build Checklist UI
    const checklistHtml = `
        <ul style="margin: 5px 0 0 0; padding-left: 20px; font-size: 0.9rem; display: flex; flex-wrap: wrap; gap: 15px; list-style-type: none;">
            <li style="color: ${cl.purpose_procedures_explained ? 'green':'#e74c3c'}">${cl.purpose_procedures_explained ? '✅':'❌'} Purpose & Procedures</li>
            <li style="color: ${cl.risks_discomforts_explained ? 'green':'#e74c3c'}">${cl.risks_discomforts_explained ? '✅':'❌'} Risks Overview</li>
            <li style="color: ${cl.benefits_compensation_explained ? 'green':'#e74c3c'}">${cl.benefits_compensation_explained ? '✅':'❌'} Benefits</li>
            <li style="color: ${cl.voluntariness_withdrawal_explained ? 'green':'#e74c3c'}">${cl.voluntariness_withdrawal_explained ? '✅':'❌'} Voluntariness</li>
            <li style="color: ${cl.privacy_confidentiality_explained ? 'green':'#e74c3c'}">${cl.privacy_confidentiality_explained ? '✅':'❌'} Privacy/HIPAA</li>
            <li style="color: ${cl.teach_back_used ? 'green':'#e74c3c'}">${cl.teach_back_used ? '✅':'❌'} Teach-Back Used</li>
        </ul>
    `;
    
    let html = `
    <div class="decision-card" style="border-left-color: ${node.colorTheme.border}; opacity: 1;">
        <div class="card-header" ${firstTurnIndex !== null ? `onclick="scrollToTurn(${firstTurnIndex})"` : ''}>
            <h4>[${node.problem_area}] ${node.summary}</h4>
            <div>${riskBadge}<span class="badge" style="background: ${node.colorTheme.bg}; color: ${node.colorTheme.tag}; border: 1px solid ${node.colorTheme.border}">${node.decision_type || 'Procedure'}</span></div>
        </div>
        
        <div class="map-options">
            <strong style="font-size: 0.9rem;">AHRQ Basic Elements Present:</strong>
            ${checklistHtml}
        </div>

        <div class="map-options" style="background: #fff; border: 1px solid #dfe4ea;">
            <strong style="font-size: 0.9rem; color: var(--primary);">Ontology Assessment: Lumbar decompression with possible fusion</strong>
            ${risksHtml}
        </div>
    </div>`;
    
    return html;
}

function renderUI(regions, turns) {
    const results = document.getElementById('resultsContent');
    let html = `<h2>AHRQ Procedure Ontology Dashboard</h2><div class="tree-container">`;
    regions.forEach(root => { html += renderTreeNode(root); });
    html += `</div><h2>Global Transcript</h2><div class="global-transcript">`;

    turns.forEach((turn) => {
        const activeRegions = regions.filter(r => r.relevant_turn_indices && r.relevant_turn_indices.includes(turn.index));
        
        const turnTags = [];
        activeRegions.forEach(r => {
            if(r.ontology_risk_assessment) {
                r.ontology_risk_assessment.forEach(risk => {
                    if (risk.turn_indices && risk.turn_indices.includes(turn.index)) {
                        turnTags.push({ text: risk.risk_item, color: r.colorTheme.tag });
                    }
                });
            }
        });

        let turnBg = 'transparent';
        let turnBorder = 'transparent';
        
        if (activeRegions.length > 0) {
            turnBg = activeRegions[0].colorTheme.bg;
            turnBorder = activeRegions[0].colorTheme.border;
        }

        const tagsHtml = turnTags.map(t => `<span class="text-tag" style="background:${t.color};">${t.text}</span>`).join('');

        html += `
        <div id="turn-${turn.index}" class="turn-container" style="background: ${turnBg}; border-left-color: ${turnBorder};">
            <div class="turn-meta"><div>[TURN ${turn.index}]</div><div style="color:#2f3640;">${turn.speaker_line}</div></div>
            <div class="turn-content">${tagsHtml.length > 0 ? `<div class="turn-tags">${tagsHtml}</div>` : ''}${turn.text_lines.join('\n')}</div>
        </div>`;
    });

    html += `</div>`;
    results.innerHTML = html;
}
</script>
</body>
</html>
