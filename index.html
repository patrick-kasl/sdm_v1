<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCQ SDM Pipeline v0.4 - 3-Step Analyzer</title>
    <style>
        :root {
            --primary: #4a69bd;
            --bg: #f5f6fa;
            --text: #2f3640;
            --border: #dcdde1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        h1, h2, h3 { color: #2c3e50; }
        
        /* SETUP BOX */
        .setup-box {
            background: #f1f2f6; padding: 20px; border-radius: 8px;
            margin-bottom: 30px; border: 1px solid #dfe4ea;
        }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 10px; margin: 5px 0 15px 0;
            border-radius: 4px; border: 1px solid #ccc;
        }
        button {
            background-color: var(--primary); color: white; border: none;
            padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem;
        }
        button:hover { background-color: #3c55a5; }

        /* DASHBOARD */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .decision-card {
            border: 1px solid #e1e4e8; border-radius: 8px; padding: 20px;
            background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border-top: 5px solid #ccc; /* Will be overwritten by JS color */
        }
        .card-header h4 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .badge {
            display: inline-block; padding: 4px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: bold; background: #eee;
        }

        /* ABSTRACTED DECISION MAPS */
        .decision-map-container {
            display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px;
        }
        .decision-map-box {
            border: 1px solid #dcdde1; border-radius: 8px; background: #fff;
            padding: 20px;
        }
        .map-options {
            background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 15px;
        }
        .map-behaviors {
            display: flex; flex-wrap: wrap; gap: 10px;
        }
        .behavior-pill {
            background: #e8ecf1; border: 1px solid #d1d8e0; border-radius: 20px;
            padding: 5px 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
        }
        .behavior-pill.invalid { text-decoration: line-through; opacity: 0.5; }

        /* GLOBAL TRANSCRIPT */
        .global-transcript {
            background: #fff; border: 1px solid #dcdde1; border-radius: 8px;
            padding: 20px;
        }
        .turn-container {
            display: flex; margin-bottom: 10px; border-radius: 6px;
            border-left: 4px solid transparent;
        }
        .turn-meta {
            width: 150px; flex-shrink: 0; padding: 10px;
            font-size: 0.8rem; font-weight: bold; color: #7f8fa6;
            text-align: right; border-right: 2px solid #f1f2f6;
        }
        .turn-content {
            flex-grow: 1; padding: 10px 15px; font-family: monospace;
            font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap;
        }
        .turn-tags {
            display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px;
        }
        .text-tag {
            font-size: 0.7rem; padding: 2px 6px; border-radius: 4px;
            font-family: sans-serif; font-weight: bold; color: #fff;
        }

        /* Utility */
        .loading { display: none; padding: 20px; background: #f1f2f6; margin-bottom:20px; border-radius:4px; font-family: monospace;}
        .error { color: #e84118; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SDM Analyzer: 3-Step Pipeline</h1>
    
    <div class="setup-box">
        <label><strong>1. Google Gemini API Key:</strong></label>
        <input type="text" id="apiKey" placeholder="AIzaSy...">
        <label><strong>2. Transcript File (.txt):</strong></label>
        <input type="file" id="fileInput" accept=".txt">
        <button onclick="runAnalysis()">Run 3-Step Pipeline</button>
        <div class="error" id="errorMsg"></div>
    </div>

    <div class="loading" id="loader">
        <div id="statusLog"></div>
    </div>

    <div id="results"></div>
</div>

<script>
/**
 * ============================================================
 *  PROMPTS & SCHEMAS (3-STEP PIPELINE)
 * ============================================================
 */

// STEP 1: BROAD SEGMENTATION
const BROAD_SEGMENTATION_PROMPT = `
You are an expert clinical conversation analyst. Your ONLY goal is to EXTRACT the broad conversational boundaries of "Shared Decision-Making (SDM) Events" and clinical decisions from the transcript.

CRITICAL INSTRUCTIONS:
1. ALLOW OVERLAPPING SEGMENTS: It is completely acceptable and expected for different medical decisions to overlap. If the clinician talks about blood pressure, switches to prostate medication, and goes back to blood pressure, create separate events for each, even if their start and end indices overlap.
2. ADMINISTRATIVE/LOGISTICAL DECISIONS: Include administrative choices IF they have clinical implications (e.g., choosing a specific specialist location, selecting a dialysis facility, or setting a follow-up interval). Do not ignore them just because they are logistical.
3. EXCLUDE FALSE POSITIVES: 
   - Information Gathering: Do NOT flag patient-driven questions where the clinician just answers without offering a clinical path (e.g., Patient: "Should I take a vitamin?" -> Clinician: "No, your labs are fine").
   - Unilateral Refusals: Do NOT flag immediate patient refusals (e.g., "I don't do vaccines") IF the clinician accepts it without offering counseling or exploring options.
4. CAST A WIDE NET: For each decision, identify the FIRST time the context/topic is mentioned, and the LAST time a relevant logistical conclusion (e.g., side effects, pharmacy routing) is discussed. It is okay if there is unrelated conversation in between these two points.
5. If no decisions are present, output an empty array: []
`;

const BROAD_SEGMENTATION_SCHEMA = {
  "type": "object",
  "properties": {
    "decisions": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "id": { "type": "string" },
          "summary": { "type": "string" },
          "decision_type": { 
             "type": "string", 
             "enum": ["Clinical", "Administrative/Logistical"]
          },
          "boundary_rationale": { "type": "string" },
          "broad_start_turn_index": { "type": "integer" },
          "broad_end_turn_index": { "type": "integer" }
        },
        "required": ["id", "summary", "decision_type", "boundary_rationale", "broad_start_turn_index", "broad_end_turn_index"]
      }
    }
  }
};

// STEP 2: RELEVANCE FILTERING
const RELEVANCE_FILTERING_PROMPT = `
You are an expert clinical data parser. You will be provided with a specific "Decision Topic" and a chunk of a clinical transcript where this topic is discussed.

Medical conversations are highly discontinuous. A doctor and patient might start discussing a medication, take a long tangent to discuss an unrelated issue (like joint pain, small talk, or a different medication), and then return to the original medication to finalize the prescription.

Your ONLY task is to identify the exact turn indices that are RELEVANT to the provided Decision Topic. 

CRITICAL INSTRUCTIONS:
1. STRIP THE HAYSTACK: Remove all turn indices that correspond to small talk, physical exams, or interleaved tangents about entirely different medical conditions.
2. KEEP CONTEXT: Keep turns that provide necessary clinical context for the specific decision being made.
3. OUTPUT: Provide an array of strictly the integer turn numbers that form the cohesive discussion for this specific decision.
`;

const RELEVANCE_FILTERING_SCHEMA = {
  "type": "object",
  "properties": {
    "decision_id": { "type": "string" },
    "relevant_turn_indices": {
      "type": "array",
      "items": { "type": "integer" }
    }
  },
  "required": ["decision_id", "relevant_turn_indices"]
};

// STEP 3: CLASSIFICATION
const CLASSIFICATION_PROMPT_TEMPLATE = `
You are analyzing a filtered, highly-relevant segment of a clinical transcript for Shared Decision-Making (SDM). You will only see the lines relevant to ONE specific decision.

CRITICAL INSTRUCTIONS TO PREVENT HALLUCINATIONS & ENSURE ACCURACY:
1. OPTION NAMING MATTERS: Do not just list drug names (e.g., "Proscar"). Use active phrasing indicating the actual choice, such as "Continue current Flomax", "Add Proscar to regimen", "Stop Maalox", or "Switch to new medication".
2. TIER 0 & STATUS QUO OPTIONS: You MUST extract "status quo" options if they are implied. "Watchful waiting", "do nothing", "continue current care", and "not escalating treatment" are highly important options to capture.
3. STRONG RECOMMENDATIONS: Even if a clinician gives a strong, singular recommendation (e.g., "I really think we should drop the Maalox"), if an alternative is biologically/logically implied (e.g., "Keep the Maalox"), you should extract both options and identify the behavior as "Options Implied".
4. EXACT TURN LINKING: When classifying a behavior, you MUST extract the exact integer for the turn_index provided in the text.
5. ACROSS TANGENTS: Because you are reading a filtered transcript, you may notice jumps in the turn numbers. This is intentional. Link scattered behaviors (e.g., "Options Implied" at Turn 132, "Explaining Risks" at Turn 216) to the same Option ID.

**TAXONOMY DEFINITIONS:**
1. Options Implied, 2. Support for Deliberation, 3. Explaining Benefits, 4. Explaining Risks, 5. Explaining Burdens/Practicalities, 6. Values Exploration, 7. Patient Values Expressed, 8. Questions Invited, 9. Patient Questions Asked, 10. Preferences Elicited, 11. Preference Integration, 12. Decision Stated, 13. Decision Deferred with Plan.

**TASK:**
1. Identify the **Specific Options** actually discussed (using active phrasing).
2. Classify relevant sentences/turns using the behaviors above. 
3. **LINK** behaviors to the specific Option ID they describe.
4. **CONFIDENCE SCORE:** Assign a score (0-100).
`;

const CLASSIFICATION_SCHEMA = {
  "type": "object",
  "properties": {
    "rationale": { "type": "string" },
    "options_discussed": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "option_id": { "type": "string" },
          "label": { "type": "string" }
        },
        "required":["option_id", "label"]
      }
    },
    "classified_turns": {
      "type": "array",
      "items": {
        "type": "object",
        "properties": {
          "turn_index": { "type": "integer" },
          "behaviors": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "behavior_name": {
                  "type": "string",
                  "enum":[
                    "Options Implied", "Support for Deliberation", "Explaining Benefits",
                    "Explaining Risks", "Explaining Burdens/Practicalities",
                    "Values Exploration", "Patient Values Expressed",
                    "Questions Invited", "Patient Questions Asked",
                    "Preferences Elicited", "Preference Integration",
                    "Decision Stated", "Decision Deferred with Plan"
                  ]
                },
                "related_option_id": { "type": "string", "nullable": true },
                "confidence_score": { "type": "integer", "minimum": 0, "maximum": 100 }
              },
              "required":["behavior_name", "confidence_score"]
            }
          }
        },
        "required":["turn_index", "behaviors"]
      }
    }
  }
};

/**
 * ============================================================
 *  LOGIC & PIPELINE RUNNER
 * ============================================================
 */

// Distinct palette for highlighting overlapping decisions clearly
const REGION_COLORS = [
    { bg: '#e8f4f8', border: '#3498db', tag: '#2980b9' }, // Blue
    { bg: '#f9f0e6', border: '#e67e22', tag: '#d35400' }, // Orange
    { bg: '#eef8e8', border: '#2ecc71', tag: '#27ae60' }, // Green
    { bg: '#f4e8f8', border: '#9b59b6', tag: '#8e44ad' }, // Purple
    { bg: '#fdf0f0', border: '#e74c3c', tag: '#c0392b' }, // Red
    { bg: '#fcf8e3', border: '#f1c40f', tag: '#f39c12' }  // Yellow
];

function logStatus(msg) {
    const log = document.getElementById('statusLog');
    log.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
}

function parseTranscriptToTurns(rawText) {
    const lines = rawText.split('\n');
    const turns = [];
    let currentTurn = null;
    const speakerRegex = /^(DOCTOR|PATIENT|CLINICIAN|PROVIDER|MOM|DAD|FAMILY)\b/i;

    lines.forEach((line) => {
        const clean = line.trim();
        if (!clean) return;
        if (speakerRegex.test(clean) && clean.length < 50) { 
            if (currentTurn) turns.push(currentTurn);
            currentTurn = { index: turns.length, speaker_line: clean, text_lines: [] };
        } else {
            if (currentTurn) {
                currentTurn.text_lines.push(line);
            } else {
                currentTurn = { index: 0, speaker_line: "METADATA", text_lines: [line] };
            }
        }
    });
    if (currentTurn) turns.push(currentTurn);
    return turns;
}

function applyRuleLogic(region, allTurns) {
    const getSpeakerType = (speakerName) => {
        const s = speakerName.toUpperCase();
        if (s.includes("DOC") || s.includes("CLIN") || s.includes("PROV")) return "CLINICIAN";
        return "PATIENT";
    };

    const allowedSpeakers = {
        "Options Implied": ["CLINICIAN", "PATIENT"],
        "Support for Deliberation": ["CLINICIAN"],
        "Explaining Benefits": ["CLINICIAN"],
        "Explaining Risks": ["CLINICIAN"],
        "Explaining Burdens/Practicalities": ["CLINICIAN"],
        "Values Exploration": ["CLINICIAN"],
        "Patient Values Expressed": ["PATIENT"],
        "Questions Invited": ["CLINICIAN"],
        "Patient Questions Asked": ["PATIENT"],
        "Preferences Elicited": ["CLINICIAN"],
        "Preference Integration": ["CLINICIAN"],
        "Decision Stated": ["CLINICIAN", "PATIENT"],
        "Decision Deferred with Plan": ["CLINICIAN"]
    };

    if (!region.classified_turns) return;

    let firstOptionsIndex = Infinity;
    let lastDecisionIndex = -1;

    region.classified_turns.forEach(ct => {
        ct.behaviors.forEach(b => {
            if (b.behavior_name === "Options Implied" && ct.turn_index < firstOptionsIndex) firstOptionsIndex = ct.turn_index;
            if ((b.behavior_name === "Decision Stated" || b.behavior_name === "Decision Deferred with Plan") && ct.turn_index > lastDecisionIndex) lastDecisionIndex = ct.turn_index;
        });
    });
    
    if (lastDecisionIndex === -1) lastDecisionIndex = Infinity;
    
    region.classified_turns.forEach(ct => {
        const turnData = allTurns[ct.turn_index];
        if (!turnData) return;
        const currentSpeakerType = getSpeakerType(turnData.speaker_line);

        ct.behaviors.forEach(b => {
            b.isInvalid = false;
            b.invalidReasons = [];

            if (ct.turn_index < firstOptionsIndex) { b.isInvalid = true; b.invalidReasons.push("Pre-Options"); }
            if (ct.turn_index > lastDecisionIndex) { b.isInvalid = true; b.invalidReasons.push("Post-Decision"); }

            const allowed = allowedSpeakers[b.behavior_name];
            if (allowed && !allowed.includes(currentSpeakerType)) {
                b.isInvalid = true; b.invalidReasons.push(`Wrong Speaker (${currentSpeakerType})`);
            }
        });
    });
}

async function runAnalysis() {
    const fileInput = document.getElementById('fileInput');
    const apiKey = document.getElementById('apiKey').value;
    const loader = document.getElementById('loader');
    const results = document.getElementById('results');
    const errBox = document.getElementById('errorMsg');
    
    errBox.innerText = ""; results.innerHTML = ""; document.getElementById('statusLog').innerHTML = "";
    if (!apiKey) { errBox.innerText = "API Key required"; return; }
    if (!fileInput.files.length) { errBox.innerText = "File required"; return; }

    loader.style.display = "block";
    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async (e) => {
        try {
            const rawText = e.target.result;
            const turns = parseTranscriptToTurns(rawText);
            const fullTranscriptText = turns.map(t => `[TURN ${t.index}] ${t.speaker_line}\n${t.text_lines.join('\n')}\n`).join('\n');

            // --- STEP 1: BROAD SEGMENTATION ---
            logStatus("Step 1/3: Running Broad Segmentation...");
            const broadData = await callGemini(apiKey, BROAD_SEGMENTATION_PROMPT, BROAD_SEGMENTATION_SCHEMA, fullTranscriptText);
            const decisions = broadData.decisions || [];
            
            if (decisions.length === 0) {
                logStatus("No decisions found. Pipeline Complete.");
                loader.style.display = "none";
                return;
            }

            const finalRegions = [];

            // --- PROCESS EACH DECISION ---
            for (let i = 0; i < decisions.length; i++) {
                const reg = decisions[i];
                logStatus(`Processing Decision ${i+1}/${decisions.length}: "${reg.summary}"`);
                
                // Assign a color to this region
                reg.colorTheme = REGION_COLORS[i % REGION_COLORS.length];

                // Create a chunk of text bounded by the broad indices
                let chunkText = "";
                for (let j = reg.broad_start_turn_index; j <= reg.broad_end_turn_index; j++) {
                    if (turns[j]) chunkText += `[TURN ${j}] ${turns[j].speaker_line}\n${turns[j].text_lines.join('\n')}\n\n`;
                }

                // --- STEP 2: RELEVANCE FILTERING ---
                logStatus(`Step 2/3 (Region ${i+1}): Extracting relevant non-overlapping lines...`);
                const filterPromptStr = `Topic: ${reg.summary}\n\nTranscript Chunk:\n${chunkText}`;
                const filterData = await callGemini(apiKey, RELEVANCE_FILTERING_PROMPT, RELEVANCE_FILTERING_SCHEMA, filterPromptStr);
                
                const validIndices = (filterData.relevant_turn_indices || []).sort((a,b) => a-b);
                reg.relevant_turn_indices = validIndices;

                let filteredTranscriptText = "";
                validIndices.forEach(idx => {
                    if (turns[idx]) filteredTranscriptText += `[TURN ${idx}] ${turns[idx].speaker_line}\n${turns[idx].text_lines.join('\n')}\n\n`;
                });

                // --- STEP 3: CLASSIFICATION ---
                logStatus(`Step 3/3 (Region ${i+1}): Running Behavior Classification...`);
                const classData = await callGemini(apiKey, CLASSIFICATION_PROMPT_TEMPLATE, CLASSIFICATION_SCHEMA, filteredTranscriptText);

                const finalReg = { ...reg, ...classData };
                
                logStatus(`Validating Rule Constraints...`);
                applyRuleLogic(finalReg, turns);
                finalRegions.push(finalReg);
            }

            logStatus("Analysis Complete. Rendering decoupled UI...");
            renderUI(finalRegions, turns);

        } catch (error) {
            console.error(error);
            errBox.innerText = "Error: " + error.message;
        } finally {
            loader.style.display = "none";
        }
    };
    reader.readAsText(file);
}

async function callGemini(key, systemPrompt, schema, userContent) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${key}`;
    const payload = {
        system_instruction: { parts: [{ text: "You are a clinical coding expert." }] },
        contents: [{ parts: [{ text: `${systemPrompt}\n\n${userContent}` }] }],
        generationConfig: { 
            response_mime_type: "application/json", 
            response_schema: schema,
            temperature: 0
        }
    };

    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error(await res.text());
    
    const data = await res.json();
    const rawString = data.candidates[0].content.parts[0].text.replace(/^```json\s*/i, '').replace(/```\s*$/, '').trim();
    return JSON.parse(rawString);
}

/**
 * ============================================================
 *  UI RENDERING
 * ============================================================
 */
function renderUI(regions, turns) {
    const results = document.getElementById('results');
    
    let html = `<h2>Executive Summary</h2>`;
    html += `<div class="dashboard-grid">`;
    regions.forEach(reg => {
        html += `
        <div class="decision-card" style="border-top-color: ${reg.colorTheme.border}">
            <div class="card-header">
                <h4>${reg.summary}</h4>
                <span class="badge" style="background: ${reg.colorTheme.bg}; color: ${reg.colorTheme.tag};">${reg.decision_type || 'Clinical'}</span>
            </div>
            <div style="font-size:0.85rem; color:#7f8fa6; margin-top:10px;">
                Turns: [${reg.relevant_turn_indices.join(', ')}]
            </div>
        </div>`;
    });
    html += `</div>`;

    html += `<h2>Abstracted Decision Maps</h2>`;
    html += `<div class="decision-map-container">`;
    regions.forEach(reg => {
        const optionsHtml = (reg.options_discussed || []).map(o => `<li><strong>${o.label}</strong> (ID: ${o.option_id})</li>`).join('');
        
        let behaviorsHtml = '';
        if (reg.classified_turns) {
            reg.classified_turns.forEach(ct => {
                ct.behaviors.forEach(b => {
                    const invalidClass = b.isInvalid ? 'invalid' : '';
                    const title = b.isInvalid ? `Invalid: ${b.invalidReasons.join(', ')}` : `Score: ${b.confidence_score}%`;
                    behaviorsHtml += `<div class="behavior-pill ${invalidClass}" title="${title}">
                        <span style="font-weight:bold; color: ${reg.colorTheme.tag}">T${ct.turn_index}</span> ${b.behavior_name}
                    </div>`;
                });
            });
        }

        html += `
        <div class="decision-map-box" style="border-left: 6px solid ${reg.colorTheme.border}">
            <h3 style="margin-top:0;">${reg.summary}</h3>
            <p style="font-size:0.9rem; color:#555;">${reg.rationale || reg.boundary_rationale || ''}</p>
            <div class="map-options">
                <strong>Options Considered:</strong>
                <ul style="margin: 5px 0 0 0; padding-left: 20px;">${optionsHtml || '<li>None explicitly mapped</li>'}</ul>
            </div>
            <strong>Mapped Behaviors:</strong>
            <div class="map-behaviors" style="margin-top:10px;">
                ${behaviorsHtml || '<span style="color:#999; font-size:0.9rem;">No behaviors detected.</span>'}
            </div>
        </div>`;
    });
    html += `</div>`;

    // --- GLOBAL TRANSCRIPT ---
    html += `<h2>Global Transcript</h2>`;
    html += `<div class="global-transcript">`;

    turns.forEach((turn) => {
        // Find which regions this turn belongs to
        const activeRegions = regions.filter(r => r.relevant_turn_indices.includes(turn.index));
        
        // Find behaviors mapped specifically to this turn
        const turnTags = [];
        activeRegions.forEach(r => {
            if(r.classified_turns) {
                const mapped = r.classified_turns.find(ct => ct.turn_index === turn.index);
                if (mapped) {
                    mapped.behaviors.forEach(b => {
                        turnTags.push({ text: b.behavior_name, color: r.colorTheme.tag, invalid: b.isInvalid });
                    });
                }
            }
        });

        // Determine background and borders
        let turnBg = 'transparent';
        let turnBorder = 'transparent';
        
        if (activeRegions.length === 1) {
            turnBg = activeRegions[0].colorTheme.bg;
            turnBorder = activeRegions[0].colorTheme.border;
        } else if (activeRegions.length > 1) {
            // Overlapping - mix or use a generic highlight
            turnBg = '#f1f2f6';
            turnBorder = '#2f3640'; 
        }

        const tagsHtml = turnTags.map(t => 
            `<span class="text-tag" style="background:${t.color}; ${t.invalid ? 'text-decoration:line-through; opacity:0.5;' : ''}">${t.text}</span>`
        ).join('');

        html += `
        <div class="turn-container" style="background-color: ${turnBg}; border-left-color: ${turnBorder};">
            <div class="turn-meta">
                <div>[TURN ${turn.index}]</div>
                <div style="color:#2f3640;">${turn.speaker_line}</div>
            </div>
            <div class="turn-content">
                ${tagsHtml.length > 0 ? `<div class="turn-tags">${tagsHtml}</div>` : ''}
                ${turn.text_lines.join('\n')}
            </div>
        </div>`;
    });

    html += `</div>`;
    results.innerHTML = html;
}
</script>
</body>
</html>
